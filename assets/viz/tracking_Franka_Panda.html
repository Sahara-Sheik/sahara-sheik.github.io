const NONMV    = [5];
const DOF      = 7;


const cv=document.getElementById('cv');
const ctx=cv.getContext('2d');
let W,H;
function resize(){W=cv.width=window.innerWidth;H=cv.height=window.innerHeight;}
resize();window.addEventListener('resize',resize);

const N_J=JOINTS.length;
let curJoint=0;
let playhead=0,playing=true,scrub=false;

// Controls
const ctrlDiv=document.createElement('div');
Object.assign(ctrlDiv.style,{position:'fixed',bottom:'18px',left:'50%',
  transform:'translateX(-50%)',display:'flex',gap:'8px',zIndex:'20'});
document.body.appendChild(ctrlDiv);

JOINTS.forEach((j,i)=>{
  const b=document.createElement('button');
  b.textContent=j.replace('left_','').replace('panda_','').replace('_joint','j').replace('joint','j');
  Object.assign(b.style,{cursor:'pointer',padding:'5px 12px',fontSize:'9px',
    letterSpacing:'1px',textTransform:'uppercase',border:'1px solid #1a3a5c',
    background:i===0?'rgba(76,201,240,.15)':'transparent',
    color:NONMV.includes(i)?'#555':'#4CC9F0',fontFamily:'inherit',transition:'all .2s'});
  b.addEventListener('click',()=>{
    curJoint=i;playhead=0;playing=true;
    ctrlDiv.querySelectorAll('button').forEach(x=>x.style.background='transparent');
    b.style.background='rgba(76,201,240,.15)';
  });
  ctrlDiv.appendChild(b);
});

// Scrub
cv.addEventListener('mousedown',e=>{if(e.clientY>60){scrub=true;playing=false;}});
cv.addEventListener('mouseup',()=>{scrub=false;playing=true;});
cv.addEventListener('mousemove',e=>{
  if(scrub){
    const pad_l=70,plotW=W-70-180;
    playhead=Math.round((e.clientX-pad_l)/plotW*(GT['0'].length||200));
    playhead=Math.max(0,Math.min((GT[String(curJoint)]||[]).length-1,playhead));
  }
});

const tip=document.getElementById('tip');

function draw(){
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle='#020810';ctx.fillRect(0,0,W,H);

  const pad={t:75,b:80,l:70,r:180};
  const plotH=H-pad.t-pad.b;
  const plotW=W-pad.l-pad.r;

  const gtData=GT[String(curJoint)]||[];
  const N=gtData.length||200;
  const ph=Math.min(playhead,N-1);
  const nm=NONMV.includes(curJoint);

  // Panel
  ctx.fillStyle=nm?'rgba(40,40,60,.4)':'rgba(4,15,35,.6)';
  ctx.fillRect(pad.l,pad.t,plotW,plotH);
  if(nm){
    ctx.fillStyle='rgba(255,255,255,.04)';
    ctx.font='bold 26px JetBrains Mono';
    ctx.textAlign='center';
    ctx.fillText('[NON-MOVING JOINT]',pad.l+plotW/2,pad.t+plotH/2);
    ctx.textAlign='left';
  }

  // Grid
  for(let g=0;g<=5;g++){
    const gy=pad.t+plotH-(g/5)*plotH;
    ctx.beginPath();ctx.moveTo(pad.l,gy);ctx.lineTo(pad.l+plotW,gy);
    ctx.strokeStyle='rgba(76,201,240,.07)';ctx.lineWidth=.5;ctx.stroke();
    ctx.fillStyle='rgba(76,201,240,.35)';ctx.font='15px JetBrains Mono';
    ctx.fillText((g/5).toFixed(1),pad.l-26,gy+3);
  }
  // X ticks
  [0,.25,.5,.75,1].forEach(fr=>{
    const gx=pad.l+fr*plotW;
    ctx.beginPath();ctx.moveTo(gx,pad.t+plotH);ctx.lineTo(gx,pad.t+plotH+5);
    ctx.strokeStyle='rgba(76,201,240,.2)';ctx.lineWidth=1;ctx.stroke();
    ctx.fillStyle='rgba(76,201,240,.35)';ctx.font='15px JetBrains Mono';
    ctx.fillText(Math.round(fr*N),gx-8,pad.t+plotH+15);
  });

  // Predictions
  MODELS.forEach((m,mi)=>{
    const key=`${mi}_${curJoint}`;
    const vals=PREDS[key];
    if(!vals||vals.length===0) return;
    ctx.beginPath();
    for(let i=0;i<=Math.min(ph,vals.length-1);i++){
      const px=pad.l+(i/N)*plotW;
      const py=pad.t+plotH-Math.max(0,Math.min(1,vals[i]))*plotH;
      i?ctx.lineTo(px,py):ctx.moveTo(px,py);
    }
    ctx.strokeStyle=COLORS[m];ctx.lineWidth=1.2;ctx.globalAlpha=.55;
    ctx.stroke();ctx.globalAlpha=1;
  });

  // Ground truth
  if(gtData.length){
    ctx.beginPath();
    for(let i=0;i<=ph;i++){
      const px=pad.l+(i/N)*plotW;
      const py=pad.t+plotH-Math.max(0,Math.min(1,gtData[i]))*plotH;
      i?ctx.lineTo(px,py):ctx.moveTo(px,py);
    }
    ctx.strokeStyle='#fff';ctx.lineWidth=2.5;
    ctx.shadowColor='#ffffff55';ctx.shadowBlur=5;ctx.stroke();ctx.shadowBlur=0;
  }

  // Playhead
  const phx=pad.l+(ph/N)*plotW;
  ctx.beginPath();ctx.moveTo(phx,pad.t);ctx.lineTo(phx,pad.t+plotH);
  ctx.strokeStyle='rgba(247,37,133,.5)';ctx.lineWidth=1;
  ctx.setLineDash([4,4]);ctx.stroke();ctx.setLineDash([]);

  // Labels
  ctx.fillStyle='#4CC9F0';ctx.font='bold 21px JetBrains Mono';
  ctx.fillText(JOINTS[curJoint].replace('left_','').replace('panda_',''),pad.l+8,pad.t+20);
  ctx.fillStyle='#F72585';ctx.font='16px JetBrains Mono';
  ctx.fillText(`t = ${ph} / ${N-1}`,phx+4,pad.t+14);

  // Legend right panel
  const lx=pad.l+plotW+12,ly_s=pad.t+20;
  ctx.fillStyle='#fff';ctx.fillRect(lx,ly_s-7,18,3);
  ctx.fillStyle='#aaa';ctx.font='16px JetBrains Mono';
  ctx.fillText('ground truth',lx+22,ly_s);
  MODELS.forEach((m,mi)=>{
    const ly=ly_s+16+mi*14;
    ctx.fillStyle=COLORS[m];ctx.fillRect(lx,ly-7,18,2);
    ctx.fillStyle=COLORS[m];ctx.font='15px JetBrains Mono';
    ctx.fillText(m.replace('ptun-',''),lx+22,ly);
  });

  // Title
  ctx.fillStyle='#F72585';ctx.font='bold 18px JetBrains Mono';
  ctx.fillText(ROBOTS_LABEL,28,50);
  ctx.fillStyle='#4CC9F055';ctx.font='15px JetBrains Mono';
  ctx.fillText('← drag to scrub timeline →',W/2-80,H-30);

  if(playing) playhead=(playhead+1)%N;
  requestAnimationFrame(draw);
}
draw();

</script>
