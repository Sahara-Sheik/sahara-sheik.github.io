function makeSyntheticData() {
  const d = {};
  const baseRMSE = {
    "ConvVAE-128":0.200,"ConvVAE-256":0.185,
    "ResNet50-128":0.155,"ResNet50-256":0.140,
    "VGG19-128":0.145,"VGG19-256":0.130,
    "ViT-128":0.125,"ViT-256":0.115,
  };
  let seed = 42;
  const rng = () => { seed=(seed*16807)%2147483647; return (seed-1)/2147483646; };

  // camera positions on hemisphere (same as dome nodes)
  for (let cam = 0; cam < 112; cam++) {
    const t  = cam / 111;
    const el = t * Math.PI * 0.5;  // elevation 0=equator, π/2=zenith
    const camDifficulty = 0.6 + 0.4 * (1 - t); // equator harder

    ENCODERS.forEach(enc => {
      const noise = (rng() - 0.5) * 0.04;
      const val   = Math.max(0.04, baseRMSE[enc] * camDifficulty + noise);
      d[`${enc}|${cam}`] = +val.toFixed(5);
    });
  }
  return d;
}

const DATA = REAL_DATA || makeSyntheticData();

function fibHemisphere(n, R) {
  const pts = [], normals = [];
  const golden = Math.PI * (3 - Math.sqrt(5));
  for (let i = 0; i < n; i++) {
    const y    = i / (n - 1);                    // 0=equator  1=zenith
    const r    = Math.sqrt(Math.max(0, 1 - y*y));
    const theta= golden * i;
    const nx   = r * Math.cos(theta);
    const ny   = y;
    const nz   = r * Math.sin(theta);
    pts.push(new THREE.Vector3(nx*R, ny*R, nz*R));
    normals.push(new THREE.Vector3(nx, ny, nz));
  }
  return { pts, normals };
}

// Node dot material
const nodeMat = new THREE.MeshBasicMaterial({color:0xffffff, transparent:true, opacity:0.55});
const nodeGeo = new THREE.SphereGeometry(0.055, 8, 8);

// Store references for hover & color-mode switching
const nodeGroups = [];  // [{group, camIdx, bars:[{mesh,enc,rmse}]}]

camPts.forEach((pos, camIdx) => {
  const normal = camNormals[camIdx];

  // Build local frame: Y=outward normal, X/Z=tangent
  const worldUp = Math.abs(normal.y) > 0.95
    ? new THREE.Vector3(1,0,0)
    : new THREE.Vector3(0,1,0);
  const localX = new THREE.Vector3().crossVectors(normal, worldUp).normalize();
  const localZ = new THREE.Vector3().crossVectors(localX, normal).normalize();

  const group = new THREE.Group();
  group.position.copy(pos);
  // Orient so group's +Y = outward
  const mx = new THREE.Matrix4().makeBasis(localX, normal, localZ);
  group.setRotationFromMatrix(mx);
  scene.add(group);

  // Node dot
  const dot = new THREE.Mesh(nodeGeo, nodeMat);
  group.add(dot);

  const bars = [];
  ENCODERS.forEach((enc, i) => {
    const row = Math.floor(i / COLS);
    const col = i % COLS;
    const ox  = (col - (COLS-1)/2) * COL_GAP;
    const oz  = (row - (ROWS-1)/2) * ROW_GAP;
    const rmse   = getRMSE(enc, camIdx);
    const height = Math.max(0.02, rmse * RMSE_SCALE);

    const mesh = new THREE.Mesh(barGeo, barMats[enc]);
    mesh.scale.y = height;
    mesh.position.set(ox, height/2, oz);
    group.add(mesh);
    bars.push({ mesh, enc, rmse, ox, oz });
  });

  nodeGroups.push({ group, camIdx, bars, pos, normal });
});

// ── COLOR MODE SWITCH ─────────────────────────────────────
function setColor(mode) {
  colorMode = mode;
  document.querySelectorAll('.mbtn').forEach((b,i) =>
    b.classList.toggle('active', ['encoder','dataset'][i] === mode)
  );
  buildLegend(mode);
  document.getElementById('axkey').innerHTML =
    mode === 'encoder'
      ? `<span style="color:#F72585">▲</span> BAR HEIGHT = RMSE<br><span style="color:#4CC9F0">●</span> NODE = CAMERA POSITION<br><span style="color:#06D6A0">■</span> COLOR = ENCODER`
      : `<span style="color:#F72585">▲</span> BAR HEIGHT = RMSE<br><span style="color:#4CC9F0">●</span> NODE = CAMERA POSITION<br><span style="color:#FFB703">■</span> COLOR = DATASET`;
  // Update bar colors — by dataset we color all bars at a node the same
  // dataset color if we had per-dataset RMSE. For now keep encoder colors.
  // (Extend here when real per-dataset data is available)
}
window.setColor = setColor;

// ── RAYCASTER FOR HOVER ───────────────────────────────────
const raycaster = new THREE.Raycaster();
const mouse     = new THREE.Vector2(-999, -999);
const tip       = document.getElementById('tooltip');
let   hovered   = null;

// Collect all bar meshes for raycasting
const allBarMeshes = [];
nodeGroups.forEach(ng => ng.bars.forEach(b => {
  b.mesh.userData = { camIdx: ng.camIdx, enc: b.enc, rmse: b.rmse };
  allBarMeshes.push(b.mesh);
}));

window.addEventListener('mousemove', e => {
  mouse.x =  (e.clientX / innerWidth)  * 2 - 1;
  mouse.y = -(e.clientY / innerHeight) * 2 + 1;
  tip.style.left = (e.clientX + 14) + 'px';
  tip.style.top  = (e.clientY - 14) + 'px';
});

function updateHover() {
  raycaster.setFromCamera(mouse, cam);
  const hits = raycaster.intersectObjects(allBarMeshes);
  if (hits.length) {
    const ud  = hits[0].object.userData;
    const ng  = nodeGroups[ud.camIdx];
    const best= ng.bars.reduce((a,b)=> a.rmse < b.rmse ? a : b);
    tip.style.display = 'block';
    tip.innerHTML = `<b>CAMERA ${ud.camIdx}</b><br>` +
      ng.bars.map(b =>
        `<div class="trow">
          <span class="tenc" style="color:${ENC_CSS[b.enc]}">${b.enc}</span>
          <span class="tval">${b.rmse.toFixed(4)}</span>
        </div>`
      ).join('') +
      `<div style="margin-top:6px;color:#4CC9F0;font-size:13px;letter-spacing:2px">
        BEST: ${best.enc} (${best.rmse.toFixed(4)})</div>`;
    hovered = ud.camIdx;
  } else {
    tip.style.display = 'none';
    hovered = null;
  }
}

// ── ANIMATE ───────────────────────────────────────────────
let t = 0;
const CENTER = new THREE.Vector3(0, 3, 0);

let rafId;
function animate() {
  rafId = requestAnimationFrame(animate);
  t += 0.003;

  // Orbit camera
  cam.position.x = Math.sin(t * 0.7) * 22;
  cam.position.z = Math.cos(t * 0.7) * 22;
  cam.position.y = 8 + 5 * Math.sin(t * 0.25);
  cam.lookAt(CENTER);

  // Subtle dome rotation
  domeGroup.rotation.y += 0.0006;

  // Pulse end effector
  eeMat.color.setHSL(0.55, 1, 0.5 + 0.15 * Math.sin(t * 4));

  // Pulse node dots based on RMSE (best nodes brightest)
  nodeGroups.forEach(ng => {
    const avgRMSE = ng.bars.reduce((s,b)=>s+b.rmse,0)/ng.bars.length;
    nodeMat.opacity = 0.3;  // shared mat — just leave constant
  });

  updateHover();
  renderer.render(scene, cam);
}
animate();

</script>

<div id="export-panel">
  <div class="epanel-label">Export Options</div>
  <button class="epanel-btn et" onclick="univExportPNG('transparent')">⬇ PNG Transparent</button>
  <button class="epanel-btn ew" onclick="univExportPNG('white')">⬇ PNG White Background</button>
  <button class="epanel-btn ep" onclick="univExportPDF()">⬇ PDF Document</button>
  <button class="epanel-btn ec" onclick="univStartCrop()">✂ Crop &amp; Export</button>

  <span class="ucrop-info">Drag to select region</span>

  <button class="ucrop-ok" onclick="univApplyCrop('white')">White BG</button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script>
// ═══ UNIVERSAL EXPORT ENGINE (Three.js variant) ═══
const _USCALE = 3;

function _getThreeStuff() {
  // Find renderer, scene, camera from global scope
  const c = document.getElementById('c');
  return { canvas: c };
}

function _renderHiRes(bgMode) {
  // Access Three.js globals
  if (typeof renderer === 'undefined' || typeof scene === 'undefined' || typeof cam === 'undefined') {
    // Try alternate name 'camera'
    if (typeof camera !== 'undefined') {
      window._cam = camera;
    }
  } else {
    window._cam = cam;
  }
  const _scene = scene, _camera = window._cam || cam, _renderer = renderer;

  const w = innerWidth * _USCALE, h = innerHeight * _USCALE;
  const offR = new THREE.WebGLRenderer({ antialias:true, preserveDrawingBuffer:true, alpha: bgMode === 'transparent' });
  offR.setSize(w, h);

  const origBg = _scene.background;
  const origFog = _scene.fog;

  // Hide stars if they exist
  let hiddenObjs = [];
  _scene.traverse(obj => {
    if (obj.isPoints && obj.geometry.attributes.position && obj.geometry.attributes.position.count > 500) {
      if (bgMode === 'white' || bgMode === 'transparent') {
        if (obj.visible) { obj.visible = false; hiddenObjs.push(obj); }
      }
    }
  });

  if (bgMode === 'transparent') { _scene.background = null; _scene.fog = null; }
  else if (bgMode === 'white') { _scene.background = new THREE.Color(0xffffff); _scene.fog = null; }

  offR.render(_scene, _camera);
  const url = offR.domElement.toDataURL('image/png');

  _scene.background = origBg; _scene.fog = origFog;
  hiddenObjs.forEach(o => o.visible = true);
  offR.dispose();
  return url;
}

function _dlURL(url, fn) { const a = document.createElement('a'); a.href = url; a.download = fn; a.click(); }

function univExportPNG(mode) {
  const url = _renderHiRes(mode === 'transparent' ? 'transparent' : 'white');
  _dlURL(url, document.title.replace(/[^a-zA-Z0-9]/g,'_') + '_' + mode + '.png');
}
function univExportPDF() {
  const url = _renderHiRes('white');
  const { jsPDF } = window.jspdf;
  const pdf = new jsPDF({ orientation: innerWidth > innerHeight ? 'landscape' : 'portrait', unit: 'px', format: [innerWidth, innerHeight] });
  pdf.addImage(url, 'PNG', 0, 0, innerWidth, innerHeight);
  pdf.save(document.title.replace(/[^a-zA-Z0-9]/g,'_') + '.pdf');
}

// ═══ CROP ═══
let _cImg=null,_cRect=null,_cDrag=false,_cStart={x:0,y:0};
const _cOv=document.getElementById('crop-overlay-univ'),_cCvs=document.getElementById('crop-cvs-univ'),_cCtx=_cCvs.getContext('2d'),_cBar=document.getElementById('crop-bar-univ');

function univStartCrop(){
  const _r = renderer;
  _r.render(typeof cam!=='undefined'?scene:scene, typeof cam!=='undefined'?cam:camera);
  _cImg = new Image(); _cImg.onload = () => {
    _cCvs.width=innerWidth;_cCvs.height=innerHeight;
    _cOv.style.display='block';_cBar.style.display='flex';_cRect=null;_drawC();
  }; _cImg.src = _r.domElement.toDataURL('image/png');
}
function _drawC(){
  _cCtx.clearRect(0,0,_cCvs.width,_cCvs.height);
  _cCtx.drawImage(_cImg,0,0,_cCvs.width,_cCvs.height);
  if(_cRect){const{x,y,w,h}=_cRect;
    _cCtx.fillStyle='rgba(0,0,0,0.6)';_cCtx.fillRect(0,0,_cCvs.width,_cCvs.height);
    _cCtx.save();_cCtx.beginPath();_cCtx.rect(0,0,_cCvs.width,_cCvs.height);_cCtx.rect(x,y+h,w,-h);_cCtx.clip('evenodd');
    _cCtx.fillStyle='rgba(0,0,0,0.6)';_cCtx.fillRect(0,0,_cCvs.width,_cCvs.height);_cCtx.restore();
    _cCtx.drawImage(_cImg,0,0,_cCvs.width,_cCvs.height);
    _cCtx.save();_cCtx.beginPath();_cCtx.rect(0,0,_cCvs.width,_cCvs.height);_cCtx.rect(x,y+h,w,-h);_cCtx.clip('evenodd');
    _cCtx.fillStyle='rgba(0,0,0,0.6)';_cCtx.fillRect(0,0,_cCvs.width,_cCvs.height);_cCtx.restore();
    _cCtx.strokeStyle='#06D6A0';_cCtx.lineWidth=2;_cCtx.setLineDash([6,4]);_cCtx.strokeRect(x,y,w,h);_cCtx.setLineDash([]);
    document.getElementById('crop-dims-univ').textContent=Math.abs(Math.round(w*_USCALE))+'×'+Math.abs(Math.round(h*_USCALE))+'px';
  }
}
_cCvs.addEventListener('mousedown',e=>{_cDrag=true;_cStart={x:e.clientX,y:e.clientY};_cRect=null});
_cCvs.addEventListener('mousemove',e=>{if(!_cDrag)return;_cRect={x:Math.min(_cStart.x,e.clientX),y:Math.min(_cStart.y,e.clientY),w:Math.abs(e.clientX-_cStart.x),h:Math.abs(e.clientY-_cStart.y)};_drawC()});
_cCvs.addEventListener('mouseup',()=>_cDrag=false);

function univApplyCrop(mode){
  if(!_cRect||_cRect.w<5)return;
  const bg=mode==='pdf'?'white':mode;
  const hiURL=_renderHiRes(bg);
  const hi=new Image();hi.onload=()=>{
    const{x,y,w,h}=_cRect;
    const sx=x/_cCvs.width*hi.width,sy=y/_cCvs.height*hi.height;
    const sw=w/_cCvs.width*hi.width,sh=h/_cCvs.height*hi.height;
    const tc=document.createElement('canvas');tc.width=sw;tc.height=sh;
    const tctx=tc.getContext('2d');
    if(bg==='white'){tctx.fillStyle='#fff';tctx.fillRect(0,0,sw,sh)}
    tctx.drawImage(hi,sx,sy,sw,sh,0,0,sw,sh);
    if(mode==='pdf'){const{jsPDF}=window.jspdf;const pdf=new jsPDF({orientation:sw>sh?'landscape':'portrait',unit:'px',format:[sw/_USCALE,sh/_USCALE]});pdf.addImage(tc.toDataURL('image/png'),'PNG',0,0,sw/_USCALE,sh/_USCALE);pdf.save('crop_export.pdf')}
    else _dlURL(tc.toDataURL('image/png'),'crop_'+mode+'.png');
    univCancelCrop();
  };hi.src=hiURL;
}
function univCancelCrop(){_cOv.style.display='none';_cBar.style.display='none';_cRect=null}
</script>
