function lerpC(scheme,t){const stops=SCHEMES[scheme];t=Math.max(0,Math.min(1,t));for(let i=0;i<stops.length-1;i++){if(t>=stops[i][0]&&t<=stops[i+1][0]){const f=(t-stops[i][0])/(stops[i+1][0]-stops[i][0]);return[Math.round(stops[i][1][0]+(stops[i+1][1][0]-stops[i][1][0])*f),Math.round(stops[i][1][1]+(stops[i+1][1][1]-stops[i][1][1])*f),Math.round(stops[i][1][2]+(stops[i+1][1][2]-stops[i][1][2])*f)]}}return stops[stops.length-1][1]}

const canvas=document.getElementById('heatmap'),ctx=canvas.getContext('2d');
const MARGIN={top:20,right:50,bottom:50,left:130},CELL_W=7,CELL_H=42,GAP=3;
const SCALE=2; // retina

function totalW(){return MARGIN.left+N_CAM*CELL_W+MARGIN.right}
function totalH(){return MARGIN.top+N_ENC*(CELL_H+GAP)+MARGIN.bottom}

function drawHeatmap(bgMode='dark', targetCtx, scale) {
  const s = scale || SCALE;
  const tctx = targetCtx || ctx;
  const W=totalW(),H=totalH();

  if (!targetCtx) {
    canvas.width=W*s;canvas.height=H*s;
    canvas.style.width=W+'px';canvas.style.height=H+'px';
  }
  tctx.setTransform(s,0,0,s,0,0);

  // Background
  if(bgMode==='dark'){tctx.fillStyle='#020810';tctx.fillRect(0,0,W,H)}
  else if(bgMode==='white'){tctx.fillStyle='#ffffff';tctx.fillRect(0,0,W,H)}
  // transparent = no fill

  const labelColor = bgMode==='white' ? '#333' : '#3a7090';
  const dimColor = bgMode==='white' ? '#888' : '#1a3a52';
  const axisColor = bgMode==='white' ? '#555' : '#2a5a7a';
  const lineColor = bgMode==='white' ? '#ddd' : '#0a1f35';

  ENCODERS.forEach((enc,ei)=>{
    const y=MARGIN.top+ei*(CELL_H+GAP);
    MODEL_DATA[enc].forEach((rmse,cam)=>{
      const norm=(rmse-gMin)/(gMax-gMin);const[r,g,b]=lerpC(currentScheme,norm);
      tctx.fillStyle=`rgb(${r},${g},${b})`;tctx.fillRect(MARGIN.left+cam*CELL_W,y,CELL_W-.5,CELL_H);
    });
    tctx.fillStyle=labelColor;tctx.font='15px JetBrains Mono,monospace';tctx.textAlign='right';tctx.textBaseline='middle';
    tctx.fillText(enc,MARGIN.left-10,y+CELL_H/2);
    const mean=MODEL_DATA[enc].reduce((a,b)=>a+b,0)/N_CAM;
    tctx.fillStyle=dimColor;tctx.font='13px JetBrains Mono,monospace';tctx.textAlign='left';
    tctx.fillText(mean.toFixed(4),MARGIN.left+N_CAM*CELL_W+6,y+CELL_H/2);
  });

  tctx.fillStyle=dimColor;tctx.font='13px JetBrains Mono,monospace';tctx.textAlign='center';tctx.textBaseline='top';
  [0,14,28,42,56,70,84,98,111].forEach(cam=>{tctx.fillText(String(cam),MARGIN.left+cam*CELL_W+CELL_W/2,MARGIN.top+N_ENC*(CELL_H+GAP)+8)});
  tctx.fillStyle=axisColor;tctx.font='14px JetBrains Mono,monospace';tctx.textAlign='center';
  tctx.fillText('CAMERA POSITION',MARGIN.left+(N_CAM*CELL_W)/2,MARGIN.top+N_ENC*(CELL_H+GAP)+28);

  ENCODERS.forEach((enc,ei)=>{const y=MARGIN.top+ei*(CELL_H+GAP)+CELL_H;tctx.strokeStyle=lineColor;tctx.lineWidth=.5;tctx.beginPath();tctx.moveTo(MARGIN.left,y+GAP/2);tctx.lineTo(MARGIN.left+N_CAM*CELL_W,y+GAP/2);tctx.stroke()});

  tctx.setTransform(1,0,0,1,0,0);
  if (!targetCtx) drawColorbar();
}

function drawColorbar(){const cb=document.getElementById('cbar'),cc=cb.getContext('2d');cc.clearRect(0,0,300,14);for(let x=0;x<300;x++){const t=x/299;const[r,g,b]=lerpC(currentScheme,t);cc.fillStyle=`rgb(${r},${g},${b})`;cc.fillRect(x,0,1,14)}}

function setCS(s){currentScheme=s;drawHeatmap();document.querySelectorAll('#controls .cbtn').forEach(b=>b.classList.toggle('active',b.textContent.toLowerCase().includes(s.substring(0,4))))}

// Tooltip
const tooltipEl=document.getElementById('tooltip');
canvas.addEventListener('mousemove',e=>{
  const rect=canvas.getBoundingClientRect(),mx=e.clientX-rect.left,my=e.clientY-rect.top;
  const cam=Math.floor((mx-MARGIN.left)/CELL_W),encIdx=Math.floor((my-MARGIN.top)/(CELL_H+GAP));
  if(cam>=0&&cam<N_CAM&&encIdx>=0&&encIdx<N_ENC){
    const enc=ENCODERS[encIdx],rmse=MODEL_DATA[enc][cam],norm=((rmse-gMin)/(gMax-gMin)*100).toFixed(1);
    const mean=MODEL_DATA[enc].reduce((a,b)=>a+b,0)/N_CAM;
    drawHeatmap();
    // highlight cell
    const cx=MARGIN.left+cam*CELL_W,cy=MARGIN.top+encIdx*(CELL_H+GAP);
    ctx.save();ctx.setTransform(SCALE,0,0,SCALE,0,0);ctx.strokeStyle='#ffffff';ctx.lineWidth=2;ctx.strokeRect(cx-1,cy-1,CELL_W+1,CELL_H+2);
    ctx.strokeStyle='rgba(255,255,255,0.08)';ctx.lineWidth=1;ctx.setLineDash([4,4]);ctx.beginPath();ctx.moveTo(cx+CELL_W/2,MARGIN.top);ctx.lineTo(cx+CELL_W/2,MARGIN.top+N_ENC*(CELL_H+GAP));ctx.moveTo(MARGIN.left,cy+CELL_H/2);ctx.lineTo(MARGIN.left+N_CAM*CELL_W,cy+CELL_H/2);ctx.stroke();ctx.setLineDash([]);ctx.setTransform(1,0,0,1,0,0);ctx.restore();
    const mp=((rmse-gMin)/(gMax-gMin)*100);
    tooltipEl.style.display='block';tooltipEl.style.left=(e.clientX+16)+'px';tooltipEl.style.top=(e.clientY-10)+'px';
    tooltipEl.innerHTML=`<b>${enc}</b><div class="trow"><span>Camera</span><span class="tval">${cam}</span></div><div class="trow"><span>RMSE</span><span class="tval">${rmse.toFixed(5)}</span></div><div class="trow"><span>Percentile</span><span class="tval">${norm}%</span></div><div class="trow"><span>Enc Mean</span><span>${mean.toFixed(5)}</span></div><div class="bar"><div class="marker" style="left:${mp}%"></div></div>`;
  }else tooltipEl.style.display='none';
});
canvas.addEventListener('mouseleave',()=>{tooltipEl.style.display='none';drawHeatmap()});

// ═══ EXPORT ═══
const EX_SCALE = 4;
function renderHiRes(bgMode) {
  const W=totalW(),H=totalH();
  const oc=document.createElement('canvas');
  oc.width=W*EX_SCALE;oc.height=H*EX_SCALE;
  const octx=oc.getContext('2d');
  drawHeatmap(bgMode,octx,EX_SCALE);
  return oc;
}
function dl(url,fn){const a=document.createElement('a');a.href=url;a.download=fn;a.click()}
function exportPNG(mode){const oc=renderHiRes(mode==='transparent'?'transparent':'white');dl(oc.toDataURL('image/png'),`heatgrid_5376_${mode}.png`)}
function exportPDF(){const oc=renderHiRes('white');const W=totalW(),H=totalH();const{jsPDF}=window.jspdf;const pdf=new jsPDF({orientation:W>H?'landscape':'portrait',unit:'px',format:[W,H]});pdf.addImage(oc.toDataURL('image/png'),'PNG',0,0,W,H);pdf.save('heatgrid_5376.pdf')}

// ═══ CROP ═══
let cropImg=null,cropRect=null,cropDragging=false,cropStart={x:0,y:0};
const cropOverlay=document.getElementById('crop-overlay'),cropCanvas=document.getElementById('crop-canvas'),cropCtx=cropCanvas.getContext('2d'),cropBar=document.getElementById('crop-bar');
function startCrop(){
  const oc=renderHiRes('dark');
  cropImg=new Image();cropImg.onload=()=>{
    // Show at screen size
    cropCanvas.width=innerWidth;cropCanvas.height=innerHeight;
    cropOverlay.style.display='block';cropBar.style.display='flex';cropRect=null;drawCP();
  };cropImg.src=oc.toDataURL('image/png');
}
function drawCP(){
  cropCtx.clearRect(0,0,cropCanvas.width,cropCanvas.height);
  cropCtx.fillStyle='#020810';cropCtx.fillRect(0,0,cropCanvas.width,cropCanvas.height);
  // Center the heatmap image
  const iw=totalW(),ih=totalH();
  const offX=(cropCanvas.width-iw)/2,offY=(cropCanvas.height-ih)/2;
  cropCtx.drawImage(cropImg,0,0,cropImg.width,cropImg.height,offX,offY,iw,ih);
  if(cropRect){
    const{x,y,w,h}=cropRect;
    cropCtx.fillStyle='rgba(0,0,0,0.6)';cropCtx.fillRect(0,0,cropCanvas.width,cropCanvas.height);
    cropCtx.save();cropCtx.beginPath();cropCtx.rect(0,0,cropCanvas.width,cropCanvas.height);cropCtx.rect(x,y+h,w,-h);cropCtx.clip('evenodd');cropCtx.fillStyle='rgba(0,0,0,0.6)';cropCtx.fillRect(0,0,cropCanvas.width,cropCanvas.height);cropCtx.restore();
    cropCtx.drawImage(cropImg,0,0,cropImg.width,cropImg.height,offX,offY,iw,ih);
    cropCtx.strokeStyle='#06D6A0';cropCtx.lineWidth=2;cropCtx.setLineDash([6,4]);cropCtx.strokeRect(x,y,w,h);cropCtx.setLineDash([]);
    document.getElementById('crop-dims').textContent=`${Math.abs(Math.round(w*EX_SCALE))}×${Math.abs(Math.round(h*EX_SCALE))}px`;
  }
}
cropCanvas.addEventListener('mousedown',e=>{cropDragging=true;cropStart={x:e.clientX,y:e.clientY};cropRect=null});
cropCanvas.addEventListener('mousemove',e=>{if(!cropDragging)return;cropRect={x:Math.min(cropStart.x,e.clientX),y:Math.min(cropStart.y,e.clientY),w:Math.abs(e.clientX-cropStart.x),h:Math.abs(e.clientY-cropStart.y)};drawCP()});
cropCanvas.addEventListener('mouseup',()=>cropDragging=false);
function applyCrop(mode){
  if(!cropRect||cropRect.w<5)return;
  const{x,y,w,h}=cropRect;
  const bg=mode==='pdf'?'white':mode;
  const oc=renderHiRes(bg);
  const iw=totalW(),ih=totalH();
  const offX=(cropCanvas.width-iw)/2,offY=(cropCanvas.height-ih)/2;
  // Map crop rect to hi-res coordinates
  const sx=(x-offX)/iw*oc.width, sy=(y-offY)/ih*oc.height;
  const sw=w/iw*oc.width, sh=h/ih*oc.height;
  const tc=document.createElement('canvas');tc.width=Math.abs(sw);tc.height=Math.abs(sh);
  const tctx=tc.getContext('2d');
  if(bg==='white'){tctx.fillStyle='#fff';tctx.fillRect(0,0,tc.width,tc.height)}
  tctx.drawImage(oc,Math.max(0,sx),Math.max(0,sy),Math.abs(sw),Math.abs(sh),0,0,tc.width,tc.height);
  if(mode==='pdf'){const{jsPDF}=window.jspdf;const pdf=new jsPDF({orientation:tc.width>tc.height?'landscape':'portrait',unit:'px',format:[tc.width/EX_SCALE,tc.height/EX_SCALE]});pdf.addImage(tc.toDataURL('image/png'),'PNG',0,0,tc.width/EX_SCALE,tc.height/EX_SCALE);pdf.save('heatgrid_crop.pdf')}
  else dl(tc.toDataURL('image/png'),`heatgrid_crop_${mode}.png`);
  cancelCrop();
}
function cancelCrop(){cropOverlay.style.display='none';cropBar.style.display='none';cropRect=null}

drawHeatmap();
</script>

<div id="export-panel">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script>
// ═══ HEATGRID EXPORT (canvas-based) ═══
const _USCALE = 4;
function univExportPNG(mode) {
  const oc = renderHiRes(mode === 'transparent' ? 'transparent' : 'white');
  const a = document.createElement('a'); a.href = oc.toDataURL('image/png');
  a.download = 'heatgrid_5376_' + mode + '.png'; a.click();
}
function univExportPDF() {
  const oc = renderHiRes('white');
  const W = totalW(), H = totalH();
  const { jsPDF } = window.jspdf;
  const pdf = new jsPDF({ orientation: W > H ? 'landscape' : 'portrait', unit: 'px', format: [W, H] });
  pdf.addImage(oc.toDataURL('image/png'), 'PNG', 0, 0, W, H);
  pdf.save('heatgrid_5376.pdf');
}

let _cImg=null,_cRect=null,_cDrag=false,_cStart={x:0,y:0};
const _cOv=document.getElementById('crop-overlay-univ'),_cCvs=document.getElementById('crop-cvs-univ'),_cCtx=_cCvs.getContext('2d'),_cBar=document.getElementById('crop-bar-univ');
function univStartCrop(){
  const oc=renderHiRes('dark'); _cImg=new Image();_cImg.onload=()=>{
    _cCvs.width=innerWidth;_cCvs.height=innerHeight;_cOv.style.display='block';_cBar.style.display='flex';_cRect=null;_drawC();
  };_cImg.src=oc.toDataURL('image/png');
}
function _drawC(){_cCtx.clearRect(0,0,_cCvs.width,_cCvs.height);const iw=totalW(),ih=totalH();const ox=(_cCvs.width-iw)/2,oy=(_cCvs.height-ih)/2;_cCtx.fillStyle='#020810';_cCtx.fillRect(0,0,_cCvs.width,_cCvs.height);_cCtx.drawImage(_cImg,0,0,_cImg.width,_cImg.height,ox,oy,iw,ih);if(_cRect){const{x,y,w,h}=_cRect;_cCtx.fillStyle='rgba(0,0,0,0.6)';_cCtx.fillRect(0,0,_cCvs.width,_cCvs.height);_cCtx.save();_cCtx.beginPath();_cCtx.rect(0,0,_cCvs.width,_cCvs.height);_cCtx.rect(x,y+h,w,-h);_cCtx.clip('evenodd');_cCtx.fillStyle='rgba(0,0,0,0.6)';_cCtx.fillRect(0,0,_cCvs.width,_cCvs.height);_cCtx.restore();_cCtx.drawImage(_cImg,0,0,_cImg.width,_cImg.height,ox,oy,iw,ih);_cCtx.strokeStyle='#06D6A0';_cCtx.lineWidth=2;_cCtx.setLineDash([6,4]);_cCtx.strokeRect(x,y,w,h);_cCtx.setLineDash([]);document.getElementById('crop-dims-univ').textContent=Math.abs(Math.round(w*_USCALE))+'×'+Math.abs(Math.round(h*_USCALE))+'px'}}
_cCvs.addEventListener('mousedown',e=>{_cDrag=true;_cStart={x:e.clientX,y:e.clientY};_cRect=null});
_cCvs.addEventListener('mousemove',e=>{if(!_cDrag)return;_cRect={x:Math.min(_cStart.x,e.clientX),y:Math.min(_cStart.y,e.clientY),w:Math.abs(e.clientX-_cStart.x),h:Math.abs(e.clientY-_cStart.y)};_drawC()});
_cCvs.addEventListener('mouseup',()=>_cDrag=false);
function univApplyCrop(mode){if(!_cRect||_cRect.w<5)return;const bg=mode==='pdf'?'white':mode;const oc=renderHiRes(bg);const iw=totalW(),ih=totalH();const ox=(_cCvs.width-iw)/2,oy=(_cCvs.height-ih)/2;const{x,y,w,h}=_cRect;const sx=(x-ox)/iw*oc.width,sy=(y-oy)/ih*oc.height;const sw=w/iw*oc.width,sh=h/ih*oc.height;const tc=document.createElement('canvas');tc.width=Math.abs(sw);tc.height=Math.abs(sh);const tctx=tc.getContext('2d');if(bg==='white'){tctx.fillStyle='#fff';tctx.fillRect(0,0,tc.width,tc.height)}tctx.drawImage(oc,Math.max(0,sx),Math.max(0,sy),Math.abs(sw),Math.abs(sh),0,0,tc.width,tc.height);if(mode==='pdf'){const{jsPDF}=window.jspdf;const pdf=new jsPDF({orientation:tc.width>tc.height?'landscape':'portrait',unit:'px',format:[tc.width/_USCALE,tc.height/_USCALE]});pdf.addImage(tc.toDataURL('image/png'),'PNG',0,0,tc.width/_USCALE,tc.height/_USCALE);pdf.save('heatgrid_crop.pdf')}else{const a=document.createElement('a');a.href=tc.toDataURL('image/png');a.download='heatgrid_crop_'+mode+'.png';a.click()}univCancelCrop()}
function univCancelCrop(){_cOv.style.display='none';_cBar.style.display='none';_cRect=null}
</script>
