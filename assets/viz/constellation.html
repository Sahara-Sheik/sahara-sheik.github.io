<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>Constellation Map — Encoder Performance</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;700;800&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#020810;overflow:hidden;font-family:'JetBrains Mono','Courier New',monospace;color:#ccc}
  canvas{display:block}
  #ui{position:fixed;top:20px;left:28px;z-index:20}
  #ttl{color:#F72585;font-size:32px;font-weight:800;letter-spacing:2px;
        text-shadow:0 0 30px #F72585aa;margin-bottom:6px}
  #sub{color:#4CC9F0;font-size:16px;letter-spacing:4px;text-transform:uppercase;opacity:.7}
  #back{position:fixed;top:20px;right:24px;z-index:30;cursor:pointer;
         padding:6px 16px;font-size:16px;letter-spacing:2px;text-transform:uppercase;
         border:1px solid #1a3a5c;background:transparent;color:#4CC9F0;
         font-family:inherit;transition:all .2s;text-decoration:none}
  #back:hover{background:#4CC9F020;border-color:#4CC9F0;color:#fff}
  #tip{position:fixed;display:none;pointer-events:none;background:rgba(2,8,20,.96);
        border:1px solid #1a3a5c;padding:10px 14px;font-size:17px;color:#aaa;
        min-width:160px;box-shadow:0 0 20px #4CC9F015;z-index:40;line-height:1.7}
  #tip b{color:#F72585}
  #tip em{color:#4CC9F0}
  #tip strong{color:#7BF1A8;font-size:22px}
</style>
</head>
<body>
<a id="back" href="index.html">← Back</a>
<div id="ui"><div id="ttl">Constellation Map — Encoder Performance</div><div id="sub">Each star = one encoder on one robot · brightness = accuracy · hover for detail</div></div>
<div id="tip"></div>
<canvas id="cv"></canvas>
<script>

const STARS    = [{"robot": "AL5D", "model": "ptun-convvae-128", "x": 0.1104, "y": 0.2, "rmse": 0.2487, "bright": 0.2263, "color": "#ff6eb4"}, {"robot": "AL5D", "model": "ptun-convvae-256", "x": 0.2, "y": 0.26, "rmse": 0.2762, "bright": 0.0, "color": "#F72585"}, {"robot": "AL5D", "model": "ptun-vgg19-128", "x": 0.2696, "y": 0.2, "rmse": 0.1577, "bright": 0.9768, "color": "#ffe57a"}, {"robot": "AL5D", "model": "ptun-vgg19-256", "x": 0.1704, "y": 0.33, "rmse": 0.1591, "bright": 0.9645, "color": "#FFD60A"}, {"robot": "AL5D", "model": "ptun-resnet50-128", "x": 0.28, "y": 0.3, "rmse": 0.2315, "bright": 0.368, "color": "#b2f5d4"}, {"robot": "AL5D", "model": "ptun-resnet50-256", "x": 0.3496, "y": 0.285, "rmse": 0.2154, "bright": 0.5007, "color": "#7BF1A8"}, {"robot": "AL5D", "model": "ptun-vit-base-128", "x": 0.0904, "y": 0.34, "rmse": 0.1623, "bright": 0.9388, "color": "#9ee7ff"}, {"robot": "AL5D", "model": "ptun-vit-base-256", "x": 0.16, "y": 0.385, "rmse": 0.1548, "bright": 1.0, "color": "#4CC9F0"}, {"robot": "Unitree_G1", "model": "ptun-convvae-128", "x": 0.6904, "y": 0.15, "rmse": 0.0731, "bright": 0.2143, "color": "#ff6eb4"}, {"robot": "Unitree_G1", "model": "ptun-convvae-256", "x": 0.7, "y": 0.15, "rmse": 0.0563, "bright": 0.4604, "color": "#F72585"}, {"robot": "Unitree_G1", "model": "ptun-vgg19-128", "x": 0.7696, "y": 0.135, "rmse": 0.02, "bright": 0.9921, "color": "#ffe57a"}, {"robot": "Unitree_G1", "model": "ptun-vgg19-256", "x": 0.6304, "y": 0.22, "rmse": 0.0195, "bright": 1.0, "color": "#FFD60A"}, {"robot": "Unitree_G1", "model": "ptun-resnet50-128", "x": 0.74, "y": 0.205, "rmse": 0.0878, "bright": 0.0, "color": "#b2f5d4"}, {"robot": "Unitree_G1", "model": "ptun-resnet50-256", "x": 0.7496, "y": 0.25, "rmse": 0.0801, "bright": 0.1119, "color": "#7BF1A8"}, {"robot": "Unitree_G1", "model": "ptun-vit-base-128", "x": 0.5704, "y": 0.305, "rmse": 0.0434, "bright": 0.6492, "color": "#9ee7ff"}, {"robot": "Unitree_G1", "model": "ptun-vit-base-256", "x": 0.72, "y": 0.305, "rmse": 0.0408, "bright": 0.6882, "color": "#4CC9F0"}, {"robot": "Franka_Panda", "model": "ptun-convvae-128", "x": 0.7104, "y": 0.66, "rmse": 0.1279, "bright": 0.7305, "color": "#ff6eb4"}, {"robot": "Franka_Panda", "model": "ptun-convvae-256", "x": 0.8, "y": 0.615, "rmse": 0.159, "bright": 0.3726, "color": "#F72585"}, {"robot": "Franka_Panda", "model": "ptun-vgg19-128", "x": 0.9296, "y": 0.6, "rmse": 0.1045, "bright": 1.0, "color": "#ffe57a"}, {"robot": "Franka_Panda", "model": "ptun-vgg19-256", "x": 0.6904, "y": 0.715, "rmse": 0.1086, "bright": 0.9528, "color": "#FFD60A"}, {"robot": "Franka_Panda", "model": "ptun-resnet50-128", "x": 0.74, "y": 0.685, "rmse": 0.1669, "bright": 0.2819, "color": "#b2f5d4"}, {"robot": "Franka_Panda", "model": "ptun-resnet50-256", "x": 0.8296, "y": 0.685, "rmse": 0.1914, "bright": 0.0, "color": "#7BF1A8"}, {"robot": "Franka_Panda", "model": "ptun-vit-base-128", "x": 0.6904, "y": 0.8, "rmse": 0.1125, "bright": 0.9085, "color": "#9ee7ff"}, {"robot": "Franka_Panda", "model": "ptun-vit-base-256", "x": 0.72, "y": 0.785, "rmse": 0.1151, "bright": 0.8786, "color": "#4CC9F0"}, {"robot": "G1_regress_Franka", "model": "ptun-convvae-128", "x": 0.5004, "y": 0.65, "rmse": 0.1771, "bright": 0.2931, "color": "#ff6eb4"}, {"robot": "G1_regress_Franka", "model": "ptun-convvae-256", "x": 0.55, "y": 0.635, "rmse": 0.173, "bright": 0.3793, "color": "#F72585"}, {"robot": "G1_regress_Franka", "model": "ptun-vgg19-128", "x": 0.6796, "y": 0.68, "rmse": 0.1909, "bright": 0.0, "color": "#ffe57a"}, {"robot": "G1_regress_Franka", "model": "ptun-vgg19-256", "x": 0.4004, "y": 0.705, "rmse": 0.1796, "bright": 0.2393, "color": "#FFD60A"}, {"robot": "G1_regress_Franka", "model": "ptun-resnet50-128", "x": 0.49, "y": 0.735, "rmse": 0.1664, "bright": 0.5207, "color": "#b2f5d4"}, {"robot": "G1_regress_Franka", "model": "ptun-resnet50-256", "x": 0.6396, "y": 0.75, "rmse": 0.1831, "bright": 0.1651, "color": "#7BF1A8"}, {"robot": "G1_regress_Franka", "model": "ptun-vit-base-128", "x": 0.5004, "y": 0.76, "rmse": 0.1449, "bright": 0.9773, "color": "#9ee7ff"}, {"robot": "G1_regress_Franka", "model": "ptun-vit-base-256", "x": 0.59, "y": 0.82, "rmse": 0.1439, "bright": 1.0, "color": "#4CC9F0"}, {"robot": "Franka_regress_G1", "model": "ptun-convvae-128", "x": 0.2304, "y": 0.58, "rmse": 0.0632, "bright": 1.0, "color": "#ff6eb4"}, {"robot": "Franka_regress_G1", "model": "ptun-convvae-256", "x": 0.44, "y": 0.61, "rmse": 0.0659, "bright": 0.9744, "color": "#F72585"}, {"robot": "Franka_regress_G1", "model": "ptun-vgg19-128", "x": 0.5096, "y": 0.595, "rmse": 0.1164, "bright": 0.4894, "color": "#ffe57a"}, {"robot": "Franka_regress_G1", "model": "ptun-vgg19-256", "x": 0.2704, "y": 0.68, "rmse": 0.0989, "bright": 0.6571, "color": "#FFD60A"}, {"robot": "Franka_regress_G1", "model": "ptun-resnet50-128", "x": 0.32, "y": 0.62, "rmse": 0.1674, "bright": 0.0, "color": "#b2f5d4"}, {"robot": "Franka_regress_G1", "model": "ptun-resnet50-256", "x": 0.4496, "y": 0.65, "rmse": 0.1662, "bright": 0.0108, "color": "#7BF1A8"}, {"robot": "Franka_regress_G1", "model": "ptun-vit-base-128", "x": 0.3304, "y": 0.69, "rmse": 0.1165, "bright": 0.4882, "color": "#9ee7ff"}, {"robot": "Franka_regress_G1", "model": "ptun-vit-base-256", "x": 0.38, "y": 0.75, "rmse": 0.1016, "bright": 0.6312, "color": "#4CC9F0"}];
const CLUSTERS = [{"robot": "AL5D", "label": "AL5D", "x": 0.22, "y": 0.3, "is_transfer": false}, {"robot": "Unitree_G1", "label": "Unitree G1", "x": 0.72, "y": 0.22, "is_transfer": false}, {"robot": "Franka_Panda", "label": "Franka Panda", "x": 0.78, "y": 0.7, "is_transfer": false}, {"robot": "G1_regress_Franka", "label": "G1 \u2192 Franka Transfer", "x": 0.55, "y": 0.72, "is_transfer": true}, {"robot": "Franka_regress_G1", "label": "Franka \u2192 G1 Transfer", "x": 0.38, "y": 0.65, "is_transfer": true}];
const COLORS   = {"ptun-convvae-128": "#ff6eb4", "ptun-convvae-256": "#F72585", "ptun-vgg19-128": "#ffe57a", "ptun-vgg19-256": "#FFD60A", "ptun-resnet50-128": "#b2f5d4", "ptun-resnet50-256": "#7BF1A8", "ptun-vit-base-128": "#9ee7ff", "ptun-vit-base-256": "#4CC9F0"};


const cv=document.getElementById('cv');
const ctx=cv.getContext('2d');
let W,H;
function resize(){W=cv.width=window.innerWidth;H=cv.height=window.innerHeight;}
resize();window.addEventListener('resize',resize);
const tip=document.getElementById('tip');
let hov=null, t=0;

// Background stars
const bgStars=Array.from({length:280},()=>({
  x:Math.random(),y:Math.random(),
  r:Math.random()*1.1+0.2,
  twinkle:Math.random()*Math.PI*2
}));

cv.addEventListener('mousemove',e=>{
  hov=null;
  let best=22;
  STARS.forEach(s=>{
    const sx=s.x*W, sy=s.y*H;
    const d=Math.hypot(e.clientX-sx,e.clientY-sy);
    if(d<best){best=d;hov=s;}
  });
  if(hov){
    tip.style.display='block';tip.style.left=(e.clientX+14)+'px';tip.style.top=(e.clientY-8)+'px';
    tip.innerHTML=`<b style="color:${hov.color}">${hov.model}</b>`
      +`<br><em>${hov.robot.replace(/_/g,' ')}</em>`
      +`<br>avg RMSE: <strong>${hov.rmse.toFixed(4)}</strong>`
      +`<br>brightness: <strong>${(hov.bright*100).toFixed(0)}%</strong>`;
  } else tip.style.display='none';
});
cv.addEventListener('mouseleave',()=>{hov=null;tip.style.display='none';});

function draw(){
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle='#020810';ctx.fillRect(0,0,W,H);

  // Background stars
  bgStars.forEach(s=>{
    const a=0.15+0.1*Math.sin(t*0.02+s.twinkle);
    ctx.beginPath();ctx.arc(s.x*W,s.y*H,s.r,0,Math.PI*2);
    ctx.fillStyle=`rgba(76,201,240,${a})`;ctx.fill();
  });

  // Nebula glow per cluster
  CLUSTERS.forEach(cl=>{
    const cx=cl.x*W, cy=cl.y*H;
    const col=cl.is_transfer?'247,37,133':'76,201,240';
    const grd=ctx.createRadialGradient(cx,cy,0,cx,cy,W*0.14);
    grd.addColorStop(0,`rgba(${col},0.07)`);
    grd.addColorStop(1,`rgba(${col},0)`);
    ctx.beginPath();ctx.arc(cx,cy,W*0.14,0,Math.PI*2);
    ctx.fillStyle=grd;ctx.fill();
  });

  // Cluster lines between stars of same robot
  CLUSTERS.forEach(cl=>{
    const clStars=STARS.filter(s=>s.robot===cl.robot);
    clStars.forEach((a,i)=>{
      clStars.forEach((b,j)=>{
        if(j<=i) return;
        ctx.beginPath();ctx.moveTo(a.x*W,a.y*H);ctx.lineTo(b.x*W,b.y*H);
        ctx.strokeStyle='rgba(76,201,240,0.06)';ctx.lineWidth=0.5;ctx.stroke();
      });
    });
  });

  // Stars
  STARS.forEach(s=>{
    const sx=s.x*W, sy=s.y*H;
    const isHov=hov&&hov.model===s.model&&hov.robot===s.robot;
    const pulse=isHov?1+0.2*Math.sin(t*0.12):1;
    const r=(3+s.bright*9)*pulse;
    const alpha=0.3+s.bright*0.7;

    // Glow
    const grd=ctx.createRadialGradient(sx,sy,0,sx,sy,r*3);
    grd.addColorStop(0,s.color+(isHov?'cc':'66'));
    grd.addColorStop(1,s.color+'00');
    ctx.beginPath();ctx.arc(sx,sy,r*3,0,Math.PI*2);
    ctx.fillStyle=grd;ctx.fill();

    // Core
    ctx.beginPath();ctx.arc(sx,sy,r,0,Math.PI*2);
    ctx.fillStyle=s.color;ctx.globalAlpha=alpha;
    if(isHov){ctx.shadowColor=s.color;ctx.shadowBlur=20;}
    ctx.fill();ctx.shadowBlur=0;ctx.globalAlpha=1;

    // Label on hover or brightest in cluster
    if(isHov){
      ctx.fillStyle=s.color;ctx.font='bold 16px JetBrains Mono';
      ctx.fillText(s.model.replace('ptun-',''),sx+r+5,sy+4);
    }
  });

  // Cluster labels
  CLUSTERS.forEach(cl=>{
    const cx=cl.x*W, cy=cl.y*H;
    const col=cl.is_transfer?'#F72585':'#4CC9F0';
    ctx.fillStyle=col;ctx.font='bold 20px JetBrains Mono';ctx.textAlign='center';
    ctx.fillText(cl.label,cx,cy-W*0.10);
    if(cl.is_transfer){
      ctx.fillStyle='rgba(247,37,133,0.4)';ctx.font='13px JetBrains Mono';
      ctx.fillText('TRANSFER',cx,cy-W*0.10+14);
    }
  });
  ctx.textAlign='left';

  // Legend bottom left
  ctx.fillStyle='rgba(76,201,240,0.35)';ctx.font='15px JetBrains Mono';
  ctx.fillText('★ brighter star = lower RMSE = better encoder on that robot',24,H-22);
  ctx.fillText('○ larger star = relatively better within that robot cluster',24,H-8);

  t++;
  requestAnimationFrame(draw);
}
draw();

</script>
</body></html>
