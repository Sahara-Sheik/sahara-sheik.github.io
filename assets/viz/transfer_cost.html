<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>Transfer Cost</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;700;800&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#020810;overflow:hidden;font-family:'JetBrains Mono','Courier New',monospace;color:#ccc}
  canvas{display:block}
  #ui{position:fixed;top:20px;left:28px;z-index:20}
  #ttl{color:#F72585;font-size:32px;font-weight:800;letter-spacing:2px;
        text-shadow:0 0 30px #F72585aa;margin-bottom:6px}
  #sub{color:#4CC9F0;font-size:16px;letter-spacing:4px;text-transform:uppercase;opacity:.7}
  #back{position:fixed;top:20px;right:24px;z-index:30;cursor:pointer;
         padding:6px 16px;font-size:16px;letter-spacing:2px;text-transform:uppercase;
         border:1px solid #1a3a5c;background:transparent;color:#4CC9F0;
         font-family:inherit;transition:all .2s;text-decoration:none}
  #back:hover{background:#4CC9F020;border-color:#4CC9F0;color:#fff}
  #tip{position:fixed;display:none;pointer-events:none;background:rgba(2,8,20,.96);
        border:1px solid #1a3a5c;padding:10px 14px;font-size:17px;color:#aaa;
        min-width:160px;box-shadow:0 0 20px #4CC9F015;z-index:40;line-height:1.7}
  #tip b{color:#F72585}
  #tip em{color:#4CC9F0}
  #tip strong{color:#7BF1A8;font-size:22px}
</style>
</head>
<body>
<a id="back" href="index.html">← Back</a>
<div id="ui"><div id="ttl">Transfer Cost</div><div id="sub">Own-robot avg RMSE vs cross-robot transfer · lower delta = transfers better</div></div>
<div id="tip"></div>
<canvas id="cv"></canvas>
<script>

const COLORS = {"ptun-convvae-128": "#ff6eb4", "ptun-convvae-256": "#F72585", "ptun-vgg19-128": "#ffe57a", "ptun-vgg19-256": "#FFD60A", "ptun-resnet50-128": "#b2f5d4", "ptun-resnet50-256": "#7BF1A8", "ptun-vit-base-128": "#9ee7ff", "ptun-vit-base-256": "#4CC9F0"};
const TRANSFER_DATA = [{"label": "G1 \u2192 Franka", "src": "Unitree G1", "tgt": "G1 \u2192 Franka Transfer", "encoders": [{"model": "ptun-convvae-128", "own": 0.0731, "transfer": 0.1771, "delta": 0.104, "pct": 142.3}, {"model": "ptun-convvae-256", "own": 0.0563, "transfer": 0.173, "delta": 0.1167, "pct": 207.3}, {"model": "ptun-vgg19-128", "own": 0.02, "transfer": 0.1909, "delta": 0.1709, "pct": 854.5}, {"model": "ptun-vgg19-256", "own": 0.0195, "transfer": 0.1796, "delta": 0.1601, "pct": 821.0}, {"model": "ptun-resnet50-128", "own": 0.0878, "transfer": 0.1664, "delta": 0.0786, "pct": 89.5}, {"model": "ptun-resnet50-256", "own": 0.0801, "transfer": 0.1831, "delta": 0.103, "pct": 128.6}, {"model": "ptun-vit-base-128", "own": 0.0434, "transfer": 0.1449, "delta": 0.1015, "pct": 233.9}, {"model": "ptun-vit-base-256", "own": 0.0408, "transfer": 0.1439, "delta": 0.1031, "pct": 252.7}]}, {"label": "Franka \u2192 G1", "src": "Franka Panda", "tgt": "Franka \u2192 G1 Transfer", "encoders": [{"model": "ptun-convvae-128", "own": 0.1279, "transfer": 0.0632, "delta": -0.0647, "pct": -50.6}, {"model": "ptun-convvae-256", "own": 0.159, "transfer": 0.0659, "delta": -0.0931, "pct": -58.6}, {"model": "ptun-vgg19-128", "own": 0.1045, "transfer": 0.1164, "delta": 0.0119, "pct": 11.4}, {"model": "ptun-vgg19-256", "own": 0.1086, "transfer": 0.0989, "delta": -0.0097, "pct": -8.9}, {"model": "ptun-resnet50-128", "own": 0.1669, "transfer": 0.1674, "delta": 0.0005, "pct": 0.3}, {"model": "ptun-resnet50-256", "own": 0.1914, "transfer": 0.1662, "delta": -0.0252, "pct": -13.2}, {"model": "ptun-vit-base-128", "own": 0.1125, "transfer": 0.1165, "delta": 0.004, "pct": 3.6}, {"model": "ptun-vit-base-256", "own": 0.1151, "transfer": 0.1016, "delta": -0.0135, "pct": -11.7}]}];


const cv=document.getElementById('cv');
const ctx=cv.getContext('2d');
let W,H;
function resize(){W=cv.width=window.innerWidth;H=cv.height=window.innerHeight;}
resize();window.addEventListener('resize',resize);
const tip=document.getElementById('tip');
let hov=null;
let anim=0;

cv.addEventListener('mousemove',e=>{
  hov=null;
  const mx=e.clientX,my=e.clientY;
  _hitZones.forEach(z=>{
    if(mx>=z.x&&mx<=z.x+z.w&&my>=z.y&&my<=z.y+z.h) hov=z;
  });
  if(hov){
    const r=hov.row;
    const sign=r.delta>=0?'+':'';
    tip.style.display='block';tip.style.left=(mx+14)+'px';tip.style.top=(my-8)+'px';
    tip.innerHTML=`<b style="color:${COLORS[r.model]||'#aaa'}">${r.model}</b>`
      +`<br>Own: <strong>${r.own!==null?r.own.toFixed(3):'N/A'}</strong>`
      +`<br>Transfer: <strong>${r.transfer!==null?r.transfer.toFixed(3):'N/A'}</strong>`
      +`<br>Δ: <strong style="color:${r.delta>0?'#F72585':'#7BF1A8'}">${r.delta!==null?sign+r.delta.toFixed(3):'N/A'}</strong>`
      +(r.pct!==null?` (${r.pct>0?'+':''}${r.pct}%)`:'');
  } else tip.style.display='none';
});
cv.addEventListener('mouseleave',()=>{hov=null;tip.style.display='none';});

const _hitZones=[];

function draw(){
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle='#020810';ctx.fillRect(0,0,W,H);
  _hitZones.length=0;
  anim=Math.min(1,anim+0.02);
  const ease=1-Math.pow(1-anim,3);

  const nP=TRANSFER_DATA.length;
  const panelW=(W-60)/nP-20;
  const startX=30;

  // Find global max for scale
  let gmax=0;
  TRANSFER_DATA.forEach(p=>p.encoders.forEach(r=>{
    if(r.own) gmax=Math.max(gmax,r.own);
    if(r.transfer) gmax=Math.max(gmax,r.transfer);
  }));

  TRANSFER_DATA.forEach((pair,pi)=>{
    const px=startX+pi*(panelW+20);
    const nE=pair.encoders.length;
    const rowH=Math.min(44,(H-160)/nE-5);
    const topY=140;
    const barAreaW=panelW*0.38;

    // Panel bg
    ctx.fillStyle='rgba(4,15,35,0.7)';
    ctx.strokeStyle='#1a3a5c';ctx.lineWidth=1;
    ctx.beginPath();ctx.roundRect(px,topY-10,panelW,nE*rowH+nE*5+20,4);
    ctx.fill();ctx.stroke();

    // Panel title
    ctx.fillStyle='#F72585';ctx.font='bold 20px JetBrains Mono';
    ctx.textAlign='center';
    ctx.fillText(pair.label,px+panelW/2,topY-22);
    ctx.fillStyle='#4CC9F055';ctx.font='15px JetBrains Mono';
    ctx.fillText(`${pair.src} → ${pair.tgt}`,px+panelW/2,topY-8);
    ctx.textAlign='left';

    // Column headers
    ctx.fillStyle='rgba(76,201,240,0.4)';ctx.font='13px JetBrains Mono';
    ctx.fillText('OWN',px+panelW*0.32,topY+2);
    ctx.fillText('TRANSFER',px+panelW*0.57,topY+2);
    ctx.fillText('Δ COST',px+panelW*0.83,topY+2);

    pair.encoders.forEach((r,ei)=>{
      const y=topY+12+ei*(rowH+5);
      const col=COLORS[r.model]||'#888';
      const isHov=hov&&hov.pi===pi&&hov.ei===ei;

      // Row highlight
      if(isHov){ctx.fillStyle='rgba(255,255,255,0.04)';ctx.fillRect(px,y-2,panelW,rowH+2);}

      // Model label
      ctx.fillStyle=col;ctx.font='bold 15px JetBrains Mono';ctx.textAlign='right';
      ctx.fillText(r.model.replace('ptun-',''),px+panelW*0.28,y+rowH/2+3);
      ctx.textAlign='left';

      // Own bar
      const ow=(r.own/gmax)*barAreaW*ease;
      ctx.fillStyle=col+'55';ctx.fillRect(px+panelW*0.30,y+2,ow,rowH-4);
      ctx.fillStyle=col;ctx.font='15px JetBrains Mono';
      ctx.fillText(r.own!==null?r.own.toFixed(3):'?',px+panelW*0.30+ow+3,y+rowH/2+3);

      // Transfer bar
      const tw=(r.transfer!==null?(r.transfer/gmax)*barAreaW*ease:0);
      const tcol=r.delta>0?'#F72585':'#7BF1A8';
      ctx.fillStyle=tcol+'44';ctx.fillRect(px+panelW*0.55,y+2,tw,rowH-4);
      ctx.fillStyle=tcol;ctx.font='15px JetBrains Mono';
      ctx.fillText(r.transfer!==null?r.transfer.toFixed(3):'?',px+panelW*0.55+tw+3,y+rowH/2+3);

      // Delta
      if(r.delta!==null){
        const sign=r.delta>=0?'+':'';
        const dcol=r.delta>0.01?'#F72585':r.delta<-0.001?'#7BF1A8':'#FFD60A';
        ctx.fillStyle=dcol;ctx.font='bold 16px JetBrains Mono';
        ctx.fillText(`${sign}${r.delta.toFixed(3)}`,px+panelW*0.80,y+rowH/2+3);
        if(r.pct!==null){
          ctx.fillStyle=dcol+'88';ctx.font='13px JetBrains Mono';
          ctx.fillText(`(${r.pct>0?'+':''}${r.pct}%)`,px+panelW*0.80,y+rowH/2+13);
        }
      }

      _hitZones.push({x:px,y,w:panelW,h:rowH,pi,ei,row:r});
    });
  });

  // Legend
  ctx.fillStyle='#7BF1A8';ctx.font='15px JetBrains Mono';
  ctx.fillText('■ green Δ = transfer improved',30,H-35);
  ctx.fillStyle='#F72585';
  ctx.fillText('■ red Δ = transfer degraded',260,H-35);
  ctx.fillStyle='rgba(76,201,240,0.3)';
  ctx.fillText('avg RMSE across moving joints per encoder',30,H-18);

  requestAnimationFrame(draw);
}
draw();

</script>
</body></html>
