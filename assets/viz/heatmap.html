<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>Grand Heatmap — All Encoders × All Joints</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;700;800&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#020810;overflow:hidden;font-family:'JetBrains Mono','Courier New',monospace;color:#ccc}
  canvas{display:block}
  #ui{position:fixed;top:20px;left:28px;z-index:20}
  #ttl{color:#F72585;font-size:32px;font-weight:800;letter-spacing:2px;
        text-shadow:0 0 30px #F72585aa;margin-bottom:6px}
  #sub{color:#4CC9F0;font-size:16px;letter-spacing:4px;text-transform:uppercase;opacity:.7}
  #back{position:fixed;top:20px;right:24px;z-index:30;cursor:pointer;
         padding:6px 16px;font-size:16px;letter-spacing:2px;text-transform:uppercase;
         border:1px solid #1a3a5c;background:transparent;color:#4CC9F0;
         font-family:inherit;transition:all .2s;text-decoration:none}
  #back:hover{background:#4CC9F020;border-color:#4CC9F0;color:#fff}
  #tip{position:fixed;display:none;pointer-events:none;background:rgba(2,8,20,.96);
        border:1px solid #1a3a5c;padding:10px 14px;font-size:17px;color:#aaa;
        min-width:160px;box-shadow:0 0 20px #4CC9F015;z-index:40;line-height:1.7}
  #tip b{color:#F72585}
  #tip em{color:#4CC9F0}
  #tip strong{color:#7BF1A8;font-size:22px}
</style>
</head>
<body>
<a id="back" href="index.html">← Back</a>
<div id="ui"><div id="ttl">Grand Heatmap — All Encoders × All Joints</div><div id="sub">RMSE intensity · darker = worse · ★ = best per joint · hover for value</div></div>
<div id="tip"></div>
<canvas id="cv"></canvas>
<script>

const MODELS       = ["ptun-convvae-128", "ptun-convvae-256", "ptun-vgg19-128", "ptun-vgg19-256", "ptun-resnet50-128", "ptun-resnet50-256", "ptun-vit-base-128", "ptun-vit-base-256"];
const COLORS       = {"ptun-convvae-128": "#ff6eb4", "ptun-convvae-256": "#F72585", "ptun-vgg19-128": "#ffe57a", "ptun-vgg19-256": "#FFD60A", "ptun-resnet50-128": "#b2f5d4", "ptun-resnet50-256": "#7BF1A8", "ptun-vit-base-128": "#9ee7ff", "ptun-vit-base-256": "#4CC9F0"};
const COLS         = [{"robot": "AL5D", "joint": "height", "display": "height", "short": "height", "nonmov": false}, {"robot": "AL5D", "joint": "distance", "display": "distance", "short": "distance", "nonmov": false}, {"robot": "AL5D", "joint": "heading", "display": "heading", "short": "heading", "nonmov": false}, {"robot": "AL5D", "joint": "wrist_angle", "display": "wrist_angle", "short": "wrist_angle", "nonmov": false}, {"robot": "AL5D", "joint": "wrist_rotation", "display": "wrist_rotation", "short": "wrist_rotation", "nonmov": false}, {"robot": "AL5D", "joint": "gripper", "display": "gripper", "short": "gripper", "nonmov": false}, {"robot": "Unitree_G1", "joint": "distance", "display": "left_shoulder_pitch_joint", "short": "shoulder_pitch", "nonmov": false}, {"robot": "Unitree_G1", "joint": "gripper", "display": "left_shoulder_roll_joint", "short": "shoulder_roll", "nonmov": false}, {"robot": "Unitree_G1", "joint": "heading", "display": "left_shoulder_yaw_joint", "short": "shoulder_yaw", "nonmov": false}, {"robot": "Unitree_G1", "joint": "height", "display": "left_elbow_joint", "short": "elbow", "nonmov": false}, {"robot": "Unitree_G1", "joint": "wrist_angle", "display": "left_wrist_pitch_joint", "short": "wrist_pitch", "nonmov": true}, {"robot": "Unitree_G1", "joint": "wrist_rotation", "display": "left_wrist_roll_joint", "short": "wrist_roll", "nonmov": true}, {"robot": "Unitree_G1", "joint": "7th_number", "display": "left_wrist_yaw_joint", "short": "wrist_yaw", "nonmov": true}, {"robot": "Franka_Panda", "joint": "distance", "display": "panda_joint1", "short": "j1", "nonmov": false}, {"robot": "Franka_Panda", "joint": "heading", "display": "panda_joint2", "short": "j2", "nonmov": false}, {"robot": "Franka_Panda", "joint": "height", "display": "panda_joint3", "short": "j3", "nonmov": false}, {"robot": "Franka_Panda", "joint": "wrist_angle", "display": "panda_joint4", "short": "j4", "nonmov": false}, {"robot": "Franka_Panda", "joint": "wrist_rotation", "display": "panda_joint5", "short": "j5", "nonmov": false}, {"robot": "Franka_Panda", "joint": "7th_number", "display": "panda_joint6", "short": "j6", "nonmov": true}, {"robot": "Franka_Panda", "joint": "gripper", "display": "panda_joint7", "short": "j7", "nonmov": false}, {"robot": "G1_regress_Franka", "joint": "distance", "display": "panda_joint1", "short": "j1", "nonmov": false}, {"robot": "G1_regress_Franka", "joint": "heading", "display": "panda_joint2", "short": "j2", "nonmov": false}, {"robot": "G1_regress_Franka", "joint": "height", "display": "panda_joint3", "short": "j3", "nonmov": false}, {"robot": "G1_regress_Franka", "joint": "wrist_angle", "display": "panda_joint4", "short": "j4", "nonmov": false}, {"robot": "G1_regress_Franka", "joint": "wrist_rotation", "display": "panda_joint5", "short": "j5", "nonmov": false}, {"robot": "G1_regress_Franka", "joint": "7th_number", "display": "panda_joint6", "short": "j6", "nonmov": true}, {"robot": "G1_regress_Franka", "joint": "gripper", "display": "panda_joint7", "short": "j7", "nonmov": false}, {"robot": "Franka_regress_G1", "joint": "distance", "display": "left_shoulder_pitch_joint", "short": "shoulder_pitch", "nonmov": false}, {"robot": "Franka_regress_G1", "joint": "gripper", "display": "left_shoulder_roll_joint", "short": "shoulder_roll", "nonmov": false}, {"robot": "Franka_regress_G1", "joint": "heading", "display": "left_shoulder_yaw_joint", "short": "shoulder_yaw", "nonmov": false}, {"robot": "Franka_regress_G1", "joint": "height", "display": "left_elbow_joint", "short": "elbow", "nonmov": false}, {"robot": "Franka_regress_G1", "joint": "wrist_angle", "display": "left_wrist_pitch_joint", "short": "wrist_pitch", "nonmov": true}, {"robot": "Franka_regress_G1", "joint": "wrist_rotation", "display": "left_wrist_roll_joint", "short": "wrist_roll", "nonmov": true}, {"robot": "Franka_regress_G1", "joint": "7th_number", "display": "left_wrist_yaw_joint", "short": "wrist_yaw", "nonmov": true}];
const ROBOT_SPANS  = [{"label": "AL5D (Real 6-DOF)", "short": "AL5D", "start": 0, "end": 5}, {"label": "Unitree G1 (Sim 7-DOF)", "short": "Unitree G1", "start": 6, "end": 12}, {"label": "Franka Panda (Real 7-DOF)", "short": "Franka Panda", "start": 13, "end": 19}, {"label": "G1 \u2192 Franka Transfer", "short": "G1 \u2192 Franka Transfer", "start": 20, "end": 26}, {"label": "Franka \u2192 G1 Transfer", "short": "Franka \u2192 G1 Transfer", "start": 27, "end": 33}];
const MATRIX       = [[0.3014, 0.2094, 0.1453, 0.233, 0.3117, 0.2916, 0.0516, 0.0896, 0.0883, 0.063, 0.0004, 0.0005, 0.0001, 0.1165, 0.1892, 0.0758, 0.1546, 0.0981, 0.0006, 0.1334, 0.1568, 0.1961, 0.2301, 0.2109, 0.1083, 0.0107, 0.1603, 0.0369, 0.0822, 0.0952, 0.0386, 0.0014, 0.0006, 0.0001], [0.3522, 0.133, 0.1228, 0.3341, 0.3646, 0.3504, 0.0302, 0.0739, 0.0802, 0.0411, 0.0043, 0.0045, 0.0006, 0.1457, 0.1337, 0.2042, 0.1263, 0.1744, 0.0048, 0.17, 0.203, 0.1538, 0.2232, 0.0974, 0.1464, 0.0064, 0.2144, 0.0358, 0.0818, 0.1049, 0.0409, 0.003, 0.0026, 0.0002], [0.114, 0.0879, 0.0787, 0.136, 0.2524, 0.2769, 0.0139, 0.0259, 0.0239, 0.0164, 0.0095, 0.0072, 0.0054, 0.0786, 0.1048, 0.12, 0.1208, 0.0997, 0.0204, 0.1032, 0.1954, 0.1995, 0.1853, 0.2206, 0.1381, 0.0213, 0.2063, 0.1108, 0.1193, 0.1262, 0.1092, 0.0043, 0.0042, 0.0005], [0.1386, 0.1074, 0.0784, 0.1061, 0.2942, 0.2302, 0.0191, 0.0218, 0.0237, 0.0134, 0.0091, 0.0084, 0.0045, 0.0737, 0.0968, 0.1099, 0.0617, 0.1688, 0.0195, 0.1407, 0.1455, 0.1939, 0.2525, 0.1836, 0.115, 0.0002, 0.1872, 0.085, 0.1053, 0.1144, 0.0909, 0.0022, 0.0017, 0.0004], [0.2504, 0.2233, 0.1277, 0.2124, 0.2639, 0.3116, 0.0791, 0.0961, 0.0957, 0.0801, 0.0061, 0.0064, 0.0009, 0.2065, 0.2162, 0.1487, 0.2019, 0.0794, 0.0007, 0.1488, 0.1729, 0.2095, 0.2067, 0.136, 0.1259, 0.0046, 0.1474, 0.1919, 0.153, 0.145, 0.1795, 0.0044, 0.012, 0.0091], [0.2602, 0.1648, 0.1097, 0.2061, 0.2449, 0.307, 0.0613, 0.0927, 0.0987, 0.0677, 0.0034, 0.0063, 0.0007, 0.2041, 0.1461, 0.2388, 0.1804, 0.1447, 0.0008, 0.2343, 0.2083, 0.2142, 0.1948, 0.1726, 0.1261, 0.0039, 0.1827, 0.1874, 0.1523, 0.144, 0.1812, 0.007, 0.0006, 0.0004], [0.1155, 0.0767, 0.0619, 0.1083, 0.3243, 0.2869, 0.0287, 0.0508, 0.0586, 0.0358, 0.0043, 0.0034, 0.0008, 0.058, 0.0509, 0.0739, 0.1452, 0.1527, 0.0219, 0.1941, 0.1127, 0.1308, 0.1348, 0.1028, 0.1544, 0.0016, 0.2341, 0.089, 0.1208, 0.1479, 0.1084, 0.0016, 0.0017, 0.0006], [0.1127, 0.0789, 0.0772, 0.0957, 0.28, 0.2846, 0.0239, 0.0376, 0.0693, 0.0323, 0.0048, 0.0038, 0.002, 0.0677, 0.1015, 0.1052, 0.0489, 0.1709, 0.0029, 0.1961, 0.1183, 0.1787, 0.1135, 0.0787, 0.1405, 0.0384, 0.2334, 0.0716, 0.1126, 0.1336, 0.0887, 0.0034, 0.0014, 0.0011]];
const BEST_PER_COL = [7, 6, 6, 7, 5, 3, 2, 3, 3, 3, -1, -1, -1, 6, 6, 6, 7, 4, -1, 2, 6, 6, 7, 7, 0, -1, 4, 1, 1, 0, 0, -1, -1, -1];
const GLOBAL_MAX   = 0.3646;


const cv=document.getElementById('cv');
const ctx=cv.getContext('2d');
let W,H;
function resize(){W=cv.width=window.innerWidth;H=cv.height=window.innerHeight;}
resize();window.addEventListener('resize',resize);

const tip=document.getElementById('tip');
let hov=null;

// Margins
const ML=175, MT=110, MR=24, MB=70;

function rmseColor(v, maxV){
  if(v===null) return 'rgba(10,20,40,0.4)';
  const t=Math.pow(v/maxV,0.55);
  // dark blue → yellow → red
  if(t<0.5){
    const f=t*2;
    return `rgb(${Math.round(4+f*247)},${Math.round(18+f*178)},${Math.round(35+f*5)})`;
  } else {
    const f=(t-0.5)*2;
    return `rgb(${Math.round(251+f*4)},${Math.round(196-f*196)},${Math.round(40-f*40)})`;
  }
}

function draw(){
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle='#020810';ctx.fillRect(0,0,W,H);

  const nE=MODELS.length, nC=COLS.length;
  const plotW=W-ML-MR, plotH=H-MT-MB;
  const cw=plotW/nC, rh=plotH/nE;

  // Robot group bands
  ROBOT_SPANS.forEach((rs,ri)=>{
    const x=ML+rs.start*cw, w=(rs.end-rs.start+1)*cw;
    ctx.fillStyle=ri%2===0?'rgba(76,201,240,0.03)':'rgba(247,37,133,0.03)';
    ctx.fillRect(x,MT,w,plotH);
    ctx.strokeStyle='rgba(76,201,240,0.15)';ctx.lineWidth=1;
    ctx.strokeRect(x,MT,w,plotH);
    ctx.fillStyle='rgba(76,201,240,0.55)';
    ctx.font='bold 16px JetBrains Mono';ctx.textAlign='center';
    ctx.fillText(rs.short, x+w/2, MT-28);
    // Bracket
    ctx.beginPath();ctx.moveTo(x+4,MT-18);ctx.lineTo(x,MT-14);ctx.lineTo(x,MT-6);
    ctx.moveTo(x+w-4,MT-18);ctx.lineTo(x+w,MT-14);ctx.lineTo(x+w,MT-6);
    ctx.strokeStyle='rgba(76,201,240,0.3)';ctx.lineWidth=1;ctx.stroke();
  });
  ctx.textAlign='left';

  // Cells
  for(let ei=0;ei<nE;ei++){
    for(let ci=0;ci<nC;ci++){
      const x=ML+ci*cw, y=MT+ei*rh;
      const v=MATRIX[ei][ci];
      ctx.fillStyle=rmseColor(v,GLOBAL_MAX);
      ctx.fillRect(x+0.5,y+0.5,cw-1,rh-1);
      // Star for best
      if(BEST_PER_COL[ci]===ei){
        ctx.fillStyle='rgba(255,255,255,0.9)';
        ctx.font=`${Math.max(7,Math.min(11,rh*0.55))}px JetBrains Mono`;
        ctx.textAlign='center';
        ctx.fillText('★',x+cw/2,y+rh*0.68);
        ctx.textAlign='left';
      }
      // Hover highlight
      if(hov&&hov.e===ei&&hov.c===ci){
        ctx.strokeStyle='#fff';ctx.lineWidth=1.5;
        ctx.strokeRect(x+1,y+1,cw-2,rh-2);
      }
    }
  }

  // Row labels (model names)
  ctx.font='bold 16px JetBrains Mono';
  MODELS.forEach((m,ei)=>{
    const y=MT+ei*rh+rh/2+4;
    ctx.fillStyle=COLORS[m];
    ctx.textAlign='right';
    ctx.fillText(m.replace('ptun-',''),ML-8,y);
  });
  ctx.textAlign='left';

  // Col labels (joint names, rotated)
  COLS.forEach((c,ci)=>{
    const x=ML+ci*cw+cw/2, y=MT+plotH+8;
    ctx.save();ctx.translate(x,y);ctx.rotate(Math.PI/4);
    ctx.fillStyle=c.nonmov?'rgba(76,201,240,0.25)':'rgba(76,201,240,0.65)';
    ctx.font=(c.nonmov?'italic ':'')+'8px JetBrains Mono';
    ctx.fillText(c.short,0,0);
    ctx.restore();
  });

  // Color scale legend
  const scX=ML, scY=H-20, scW=Math.min(300,plotW*0.4);
  const grd=ctx.createLinearGradient(scX,0,scX+scW,0);
  grd.addColorStop(0,'rgb(4,18,35)');
  grd.addColorStop(0.5,'rgb(251,196,40)');
  grd.addColorStop(1,'rgb(255,0,0)');
  ctx.fillStyle=grd;ctx.fillRect(scX,scY-10,scW,10);
  ctx.fillStyle='rgba(76,201,240,0.6)';ctx.font='15px JetBrains Mono';
  ctx.fillText('0',scX,scY+10);
  ctx.fillText(GLOBAL_MAX.toFixed(3),scX+scW-22,scY+10);
  ctx.fillStyle='rgba(76,201,240,0.35)';
  ctx.fillText('RMSE →',scX+scW/2-20,scY+10);
  ctx.fillStyle='rgba(255,255,255,0.2)';
  ctx.fillText('italic / dim = non-moving joint',scX+scW+20,scY+10);

  // Tooltip
  if(hov){
    const{e,c}=hov, v=MATRIX[e][c];
    tip.style.display='block';
    tip.style.left=(hov.mx+14)+'px';tip.style.top=(hov.my-8)+'px';
    const best=BEST_PER_COL[c]===e?'<br><span style="color:#FFD60A">★ BEST for this joint</span>':'';
    const nm=COLS[c].nonmov?'<span style="color:#555"> [non-moving]</span>':'';
    tip.innerHTML=`<b>${MODELS[e]}</b><br><em>${COLS[c].display}${nm}</em>`
      +`<br><em style="color:#4CC9F055">${COLS[c].robot.replace('_',' ')}</em>`
      +`<br><strong>${v!==null?v.toFixed(4):'N/A'}</strong> RMSE${best}`;
  } else tip.style.display='none';

  requestAnimationFrame(draw);
}

// Mouse
cv.addEventListener('mousemove',e=>{
  const nC=COLS.length, nE=MODELS.length;
  const plotW=W-ML-MR, plotH=H-MT-MB;
  const cw=plotW/nC, rh=plotH/nE;
  const mx=e.clientX,my=e.clientY;
  const ci=Math.floor((mx-ML)/cw), ei=Math.floor((my-MT)/rh);
  if(ci>=0&&ci<nC&&ei>=0&&ei<nE) hov={e:ei,c:ci,mx,my};
  else hov=null;
});
cv.addEventListener('mouseleave',()=>hov=null);

draw();

</script>
</body></html>
