function drawMiniRadar(cv, r) {
  const ctx = cv.getContext('2d');
  const W = cv.width, H = cv.height;
  let t = 0;
  let phase = 0;   // 0=draw-in cycling, 1=all
  let curE = 0;
  let prog = 0;
  let ptimer = 0;
  const SPEED = 0.035, HOLD = 40, ALLF = 80;

  function frame() {
    ctx.clearRect(0,0,W,H);
    ctx.fillStyle = '#020810'; ctx.fillRect(0,0,W,H);

    const cx = W/2, cy = H/2 + 6;
    const R  = Math.min(W,H) * 0.36;
    const n  = r.joints.length;
    const angles = r.joints.map((_,i) => i/n*Math.PI*2 - Math.PI/2);

    // Rings
    [.33,.66,1].forEach(fr => {
      ctx.beginPath();
      angles.forEach((a,i) => {
        const px=cx+Math.cos(a)*R*fr, py=cy+Math.sin(a)*R*fr;
        i? ctx.lineTo(px,py): ctx.moveTo(px,py);
      });
      ctx.closePath();
      ctx.strokeStyle = fr===1 ? 'rgba(76,201,240,.2)' : 'rgba(76,201,240,.05)';
      ctx.lineWidth = 0.7; ctx.stroke();
    });

    // Axes + tiny labels
    angles.forEach((a,i) => {
      ctx.beginPath(); ctx.moveTo(cx,cy);
      ctx.lineTo(cx+Math.cos(a)*R, cy+Math.sin(a)*R);
      ctx.strokeStyle = 'rgba(76,201,240,.15)'; ctx.lineWidth=0.5; ctx.stroke();
      const nm = r.non_mv.includes(i);
      const lx2=cx+Math.cos(a)*(R+13), ly2=cy+Math.sin(a)*(R+13);
      ctx.fillStyle = nm?'rgba(76,201,240,.2)':'rgba(76,201,240,.7)';
      ctx.font = '12px JetBrains Mono'; ctx.textAlign='center';
      const lbl = r.joints[i].replace('left_','').replace('panda_','')
                              .replace('_joint','').replace('joint','j');
      ctx.fillText(lbl.slice(0,7), lx2, ly2);
    });
    ctx.textAlign='left';

    function getPts(e, progress) {
      return angles.map((a,j) => {
        const inv = r.mse_inv[e][j];
        const rv = inv !== null ? Math.min(1, Math.max(0, inv)) : 0;
        return [cx+Math.cos(a)*R*rv, cy+Math.sin(a)*R*rv];
      });
    }

    function drawPoly(pts, col, alpha, lw, progress) {
      const tot = pts.length;
      const drawn = progress * tot;
      ctx.beginPath();
      for(let i=0;i<tot;i++) {
        const[px,py]=pts[i];
        if(i===0) ctx.moveTo(px,py);
        else if(i<drawn) ctx.lineTo(px,py);
        else {
          const frac=drawn-i;
          if(frac>0){const[px0,py0]=pts[i-1];ctx.lineTo(px0+(px-px0)*frac,py0+(py-py0)*frac);}
          break;
        }
      }
      if(progress>=1) ctx.closePath();
      ctx.strokeStyle=col; ctx.lineWidth=lw;
      ctx.globalAlpha=alpha; ctx.stroke();
      if(progress>=1){
        ctx.beginPath();
        pts.forEach(([px,py],i)=>i?ctx.lineTo(px,py):ctx.moveTo(px,py));
        ctx.closePath(); ctx.fillStyle=col; ctx.globalAlpha=alpha*0.1; ctx.fill();
      }
      ctx.globalAlpha=1;
    }

    // Advance
    if(phase===0){
      prog=Math.min(1,prog+SPEED);
      if(prog>=1){ptimer++;if(ptimer>=HOLD){curE=(curE+1)%r.models.length;prog=0;ptimer=0;
        if(curE===0){phase=1;ptimer=0;}}}
    } else {
      ptimer++; if(ptimer>=ALLF){phase=0;curE=0;prog=0;ptimer=0;}
    }

    if(phase===1){
      r.models.forEach((_,e)=>{
        const pts=getPts(e);
        drawPoly(pts, r.colors[r.models[e]], 0.55, 1.2, 1);
      });
    } else {
      for(let e=0;e<curE;e++) drawPoly(getPts(e), r.colors[r.models[e]], 0.2, 0.8, 1);
      const pts=getPts(curE);
      const col=r.colors[r.models[curE]];
      ctx.shadowColor=col; ctx.shadowBlur=8;
      drawPoly(pts, col, 0.85, 1.8, prog);
      ctx.shadowBlur=0;
    }

    // Center
    ctx.beginPath(); ctx.arc(cx,cy,3,0,Math.PI*2);
    ctx.fillStyle='#F72585'; ctx.shadowColor='#F72585'; ctx.shadowBlur=6; ctx.fill(); ctx.shadowBlur=0;

    t++;
    requestAnimationFrame(frame);
  }
  frame();
}
</script>
