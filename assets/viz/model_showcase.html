<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>Model Showcase — RMSE per Encoder</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#020810;font-family:'JetBrains Mono','Courier New',monospace;
      color:#ccc;overflow:hidden;height:100vh;width:100vw}
#stage{position:fixed;inset:0;display:flex;flex-direction:column}
#header{padding:24px 36px 14px;flex-shrink:0;border-bottom:1px solid #1a3a5c22}
#model-name{font-size:44px;font-weight:800;letter-spacing:2px;
             text-shadow:0 0 40px currentColor;transition:color .4s}
#model-sub{font-size:18px;letter-spacing:4px;color:rgba(76,201,240,.6);
            text-transform:uppercase;margin-top:4px}
#wins-badge{display:inline-block;padding:4px 16px;font-size:15px;font-weight:700;
             letter-spacing:2px;border:1px solid;border-radius:2px;margin-top:8px}
#table-area{flex:1;overflow:hidden;display:flex;gap:0;padding:10px 0 0}
.robot-col{flex:1;padding:0 18px;border-right:1px solid #1a3a5c22;display:flex;flex-direction:column}
.robot-col:last-child{border-right:none}
.robot-label{font-size:15px;font-weight:700;letter-spacing:2px;text-transform:uppercase;
              color:rgba(76,201,240,.7);padding-bottom:8px;border-bottom:1px solid #1a3a5c33;
              margin-bottom:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.jrow{display:flex;justify-content:space-between;align-items:center;
       padding:5px 8px;margin:2px 0;border-radius:2px;transition:background .3s}
.jrow.best{background:rgba(123,241,168,.10);border-left:3px solid #7BF1A8}
.jrow.nonmov{opacity:.3;font-style:italic}
.jname{font-size:17px;white-space:nowrap}
.jval{font-size:20px;font-weight:700}
.jval.best{color:#7BF1A8}
.jval.missing{color:#333;font-size:14px}
#progress-bar{height:4px;background:#1a3a5c;flex-shrink:0}
#progress-fill{height:100%;width:0%;transition:width linear;}
#controls{position:fixed;bottom:20px;right:28px;display:flex;gap:8px;z-index:20}
.ctrl-btn{cursor:pointer;padding:8px 18px;font-size:14px;letter-spacing:2px;
           text-transform:uppercase;border:1px solid #1a3a5c;background:transparent;
           color:#4CC9F0;font-family:inherit;transition:all .2s}
.ctrl-btn:hover{background:#4CC9F020;border-color:#4CC9F0}
#dot-nav{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
           display:flex;gap:8px;z-index:20}
.dot{width:8px;height:8px;border-radius:50%;background:#1a3a5c;
      cursor:pointer;transition:all .3s}
.dot.active{width:24px;border-radius:4px}
#back{position:fixed;top:20px;right:24px;z-index:30;cursor:pointer;
       padding:6px 16px;font-size:14px;letter-spacing:2px;text-transform:uppercase;
       border:1px solid #1a3a5c;background:transparent;color:#4CC9F0;
       font-family:inherit;transition:all .2s;text-decoration:none}
#back:hover{background:#4CC9F020;border-color:#4CC9F0;color:#fff}
</style>
</head>
<body>
<a id="back" href="index.html">← Back</a>
<div id="stage">
  <div id="progress-bar"><div id="progress-fill"></div></div>
  <div id="header">
    <div id="model-name">—</div>
    <div id="model-sub">RMSE per joint · all robots</div>
    <div id="wins-badge">— wins</div>
  </div>
  <div id="table-area"></div>
</div>
<div id="dot-nav"></div>
<div id="controls">
  <button class="ctrl-btn" id="btn-prev">◀ prev</button>

  <button class="ctrl-btn" id="btn-next">next ▶</button>
</div>

const DWELL = 5000; // ms per model
let cur = 0, paused = false, startTime = Date.now(), elapsed = 0;

const nameEl    = document.getElementById('model-name');
const badgeEl   = document.getElementById('wins-badge');
const tableArea = document.getElementById('table-area');
const fill      = document.getElementById('progress-fill');
const dotNav    = document.getElementById('dot-nav');
const pauseBtn  = document.getElementById('btn-pause');

// Build dots
SHOWCASE.forEach((_,i)=>{
  const d=document.createElement('div');
  d.className='dot'+(i===0?' active':'');
  d.addEventListener('click',()=>goTo(i));
  dotNav.appendChild(d);
});

function goTo(idx){
  cur=((idx%SHOWCASE.length)+SHOWCASE.length)%SHOWCASE.length;
  render(SHOWCASE[cur]);
  startTime=Date.now(); elapsed=0;
  document.querySelectorAll('.dot').forEach((d,i)=>{
    d.className='dot'+(i===cur?' active':'');
    d.style.background=i===cur?SHOWCASE[cur].color:'';
  });
}

function render(s){
  nameEl.textContent=s.model;
  nameEl.style.color=s.color;
  fill.style.background=s.color;
  badgeEl.textContent=`★ ${s.wins} wins / ${s.moving} moving joints`;
  badgeEl.style.color=s.color;
  badgeEl.style.borderColor=s.color+'66';
  badgeEl.style.background=s.color+'11';
  document.title=`${s.model} — Showcase`;

  tableArea.innerHTML='';
  s.robots.forEach(rb=>{
    const col=document.createElement('div');
    col.className='robot-col';
    const lbl=document.createElement('div');
    lbl.className='robot-label';
    lbl.textContent=rb.robot;
    col.appendChild(lbl);
    rb.joints.forEach(j=>{
      const row=document.createElement('div');
      row.className='jrow'+(j.is_best&&!j.nonmov?' best':'')+(j.nonmov?' nonmov':'');
      const jn=document.createElement('div');
      jn.className='jname';
      jn.textContent=j.name;
      const jv=document.createElement('div');
      jv.className='jval'+(j.is_best&&!j.nonmov?' best':'')+(j.rmse===null?' missing':'');
      jv.textContent=j.rmse!==null?j.rmse.toFixed(4):'—';
      row.appendChild(jn);row.appendChild(jv);
      col.appendChild(row);
    });
    tableArea.appendChild(col);
  });
}

// Progress animation
function tick(){
  if(!paused){
    elapsed=Date.now()-startTime;
    const frac=Math.min(1,elapsed/DWELL);
    fill.style.width=(frac*100)+'%';
    if(frac>=1){ goTo(cur+1); }
  }
  requestAnimationFrame(tick);
}

document.getElementById('btn-prev').addEventListener('click',()=>goTo(cur-1));
document.getElementById('btn-next').addEventListener('click',()=>goTo(cur+1));
pauseBtn.addEventListener('click',()=>{
  paused=!paused;
  pauseBtn.textContent=paused?'▶ play':'⏸ pause';
  if(!paused)startTime=Date.now()-elapsed;
});

goTo(0);
tick();
</script>
