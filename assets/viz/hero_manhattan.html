<style id="export-styles">
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;700&display=swap');
  #export-panel {
    position:fixed; bottom:28px; left:22px; z-index:9999;
    pointer-events:all; display:flex; flex-direction:column; gap:5px;
    font-family:'JetBrains Mono','Courier New',monospace;
  }
  .epanel-label { font-size:13px; color:#1a3a52; letter-spacing:3px; margin-bottom:2px; text-transform:uppercase; }
  .epanel-btn {

    padding:10px 18px; font-size:10px; letter-spacing:2px;
    font-family:'JetBrains Mono','Courier New',monospace;
    cursor:pointer; text-transform:uppercase; border:1px solid; transition:all .25s;
    white-space:nowrap; display:flex; align-items:center; gap:8px;
  }
  .epanel-btn.et { background:rgba(76,201,240,.04); color:#4CC9F0; border-color:#4CC9F044; }
  .epanel-btn.et:hover { background:rgba(76,201,240,.14); box-shadow:0 0 14px #4CC9F022; }
  .epanel-btn.ew { background:rgba(255,255,255,.04); color:#8899aa; border-color:#44556644; }
  .epanel-btn.ew:hover { background:rgba(255,255,255,.12); box-shadow:0 0 14px #ffffff11; }
  .epanel-btn.ep { background:rgba(247,37,133,.04); color:#F72585; border-color:#F7258544; }
  .epanel-btn.ep:hover { background:rgba(247,37,133,.14); box-shadow:0 0 14px #F7258522; }
  .epanel-btn.ec { background:rgba(6,214,160,.04); color:#06D6A0; border-color:#06D6A044; }
  .epanel-btn.ec:hover { background:rgba(6,214,160,.14); box-shadow:0 0 14px #06D6A022; }

  #crop-overlay-univ {
    position:fixed; inset:0; z-index:10000; display:none; cursor:crosshair;
  }
  #crop-overlay-univ canvas { position:absolute; top:0; left:0; }
  #crop-bar-univ {
    position:fixed; top:16px; left:50%; transform:translateX(-50%);
    z-index:10001; background:rgba(2,8,20,.96); border:1px solid #1a3a5c;
    padding:14px 22px; font-size:10px; color:#aaa; letter-spacing:2px;
    font-family:'JetBrains Mono','Courier New',monospace;
    pointer-events:all; display:none; gap:14px; align-items:center;
  }
  #crop-bar-univ button {
    padding:10px 20px; font-size:13px; letter-spacing:2px;
    font-family:'JetBrains Mono','Courier New',monospace;
    cursor:pointer; text-transform:uppercase; border:1px solid; transition:all .2s;
  }
  .ucrop-ok { background:rgba(6,214,160,.1); color:#06D6A0; border-color:#06D6A0; }
  .ucrop-ok:hover { background:rgba(6,214,160,.25); }
  .ucrop-cancel { background:rgba(247,37,133,.1); color:#F72585; border-color:#F72585; }
  .ucrop-cancel:hover { background:rgba(247,37,133,.25); }
  .ucrop-info { color:#4CC9F0; }
</style>

  <button class="epanel-btn ew" onclick="univExportPNG('white')">⬇ PNG White Background</button>
  <button class="epanel-btn ep" onclick="univExportPDF()">⬇ PDF Document</button>
  <button class="epanel-btn ec" onclick="univStartCrop()">✂ Crop &amp; Export</button>
</div>
<div id="crop-overlay-univ"><canvas id="crop-cvs-univ"></canvas></div>
<div id="crop-bar-univ">
  <span class="ucrop-info">Drag to select region</span>
  <span id="crop-dims-univ"></span>
  <button class="ucrop-ok" onclick="univApplyCrop('transparent')">Transparent</button>
  <button class="ucrop-ok" onclick="univApplyCrop('white')">White BG</button>
  <button class="ucrop-ok" onclick="univApplyCrop('pdf')">PDF</button>
  <button class="ucrop-cancel" onclick="univCancelCrop()">Cancel</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script>
// ═══ UNIVERSAL EXPORT ENGINE (Plotly variant) ═══
const _USCALE = 3;

function _captureViz(bgMode) {
  return new Promise((resolve) => {
    // Find the plotly graph div
    const plotDiv = document.querySelector('.plotly-graph-div');
    if (!plotDiv) { alert('No plot found'); return; }

    const origBg = document.body.style.background;
    const origPaper = plotDiv._fullLayout ? plotDiv._fullLayout.paper_bgcolor : null;
    const origPlot = plotDiv._fullLayout ? plotDiv._fullLayout.plot_bgcolor : null;

    let updates = {};
    if (bgMode === 'white') {
      document.body.style.background = '#ffffff';
      updates = { paper_bgcolor: '#ffffff', plot_bgcolor: '#ffffff',
        'scene.bgcolor': '#ffffff',
        'scene.xaxis.backgroundcolor': '#f5f5f5',
        'scene.yaxis.backgroundcolor': '#f5f5f5',
        'scene.zaxis.backgroundcolor': '#f5f5f5',
        'scene.xaxis.gridcolor': '#cccccc',
        'scene.yaxis.gridcolor': '#cccccc',
        'scene.zaxis.gridcolor': '#cccccc',
        'scene.xaxis.color': '#333333',
        'scene.yaxis.color': '#333333',
        'scene.zaxis.color': '#333333',
        'scene.xaxis.titlefont.color': '#333333',
        'scene.yaxis.titlefont.color': '#333333',
        'scene.zaxis.titlefont.color': '#333333',
        'scene.xaxis.tickfont.color': '#555555',
        'scene.yaxis.tickfont.color': '#555555',
        'scene.zaxis.tickfont.color': '#555555',
        'legend.font.color': '#333333',
        'legend.bgcolor': 'rgba(245,245,245,0.9)',
        'legend.bordercolor': '#cccccc',
        'title.font.color': '#111111',
      };
    } else if (bgMode === 'transparent') {
      document.body.style.background = 'transparent';
      updates = { paper_bgcolor: 'rgba(0,0,0,0)', plot_bgcolor: 'rgba(0,0,0,0)',
        'scene.bgcolor': 'rgba(0,0,0,0)',
        'scene.xaxis.backgroundcolor': 'rgba(0,0,0,0)',
        'scene.yaxis.backgroundcolor': 'rgba(0,0,0,0)',
        'scene.zaxis.backgroundcolor': 'rgba(0,0,0,0)',
      };
    }

    Plotly.relayout(plotDiv, updates).then(() => {
      // Use Plotly's built-in image export
      Plotly.toImage(plotDiv, {
        format: 'png', width: plotDiv.offsetWidth * _USCALE,
        height: plotDiv.offsetHeight * _USCALE, scale: _USCALE
      }).then(url => {
        // Restore
        const restoreUpdates = {
          paper_bgcolor: origPaper || '#020810',
          plot_bgcolor: origPlot || '#020810',
          'scene.bgcolor': '#020810',
          'scene.xaxis.backgroundcolor': '#040d1a',
          'scene.yaxis.backgroundcolor': '#040d1a',
          'scene.zaxis.backgroundcolor': '#040d1a',
          'scene.xaxis.gridcolor': '#0a1f35',
          'scene.yaxis.gridcolor': '#0a1f35',
          'scene.zaxis.gridcolor': '#0a1f35',
          'scene.xaxis.color': '#3a7090',
          'scene.yaxis.color': '#3a7090',
          'scene.zaxis.color': '#3a7090',
          'scene.xaxis.titlefont.color': '#3a7090',
          'scene.yaxis.titlefont.color': '#3a7090',
          'scene.zaxis.titlefont.color': '#F72585',
          'scene.xaxis.tickfont.color': '#3a7090',
          'scene.yaxis.tickfont.color': '#3a7090',
          'scene.zaxis.tickfont.color': '#3a7090',
          'legend.font.color': '#3a7090',
          'legend.bgcolor': 'rgba(2,8,16,0.85)',
          'legend.bordercolor': '#0a2040',
          'title.font.color': '#ffffff',
        };
        document.body.style.background = origBg;
        Plotly.relayout(plotDiv, restoreUpdates);
        resolve(url);
      });
    });
  });
}

function _dlURL(url, fn) { const a = document.createElement('a'); a.href = url; a.download = fn; a.click(); }

function univExportPNG(mode) {
  _captureViz(mode === 'transparent' ? 'transparent' : 'white').then(url => {
    _dlURL(url, document.title.replace(/[^a-zA-Z0-9]/g,'_') + '_' + mode + '.png');
  });
}
function univExportPDF() {
  _captureViz('white').then(url => {
    const { jsPDF } = window.jspdf;
    const img = new Image(); img.onload = () => {
      const w = img.width / _USCALE, h = img.height / _USCALE;
      const pdf = new jsPDF({ orientation: w > h ? 'landscape' : 'portrait', unit: 'px', format: [w, h] });
      pdf.addImage(url, 'PNG', 0, 0, w, h);
      pdf.save(document.title.replace(/[^a-zA-Z0-9]/g,'_') + '.pdf');
    }; img.src = url;
  });
}

// ═══ CROP ═══
let _cImg=null,_cRect=null,_cDrag=false,_cStart={x:0,y:0};
const _cOv=document.getElementById('crop-overlay-univ'),_cCvs=document.getElementById('crop-cvs-univ'),_cCtx=_cCvs.getContext('2d'),_cBar=document.getElementById('crop-bar-univ');

function univStartCrop(){
  _captureViz('dark').then(url => {
    _cImg = new Image(); _cImg.onload = () => {
      _cCvs.width=innerWidth;_cCvs.height=innerHeight;
      _cOv.style.display='block';_cBar.style.display='flex';_cRect=null;_drawC();
    }; _cImg.src = url;
  });
}
function _drawC(){
  _cCtx.clearRect(0,0,_cCvs.width,_cCvs.height);
  _cCtx.drawImage(_cImg,0,0,_cCvs.width,_cCvs.height);
  if(_cRect){const{x,y,w,h}=_cRect;
    _cCtx.fillStyle='rgba(0,0,0,0.6)';_cCtx.fillRect(0,0,_cCvs.width,_cCvs.height);
    _cCtx.save();_cCtx.beginPath();_cCtx.rect(0,0,_cCvs.width,_cCvs.height);_cCtx.rect(x,y+h,w,-h);_cCtx.clip('evenodd');
    _cCtx.fillStyle='rgba(0,0,0,0.6)';_cCtx.fillRect(0,0,_cCvs.width,_cCvs.height);_cCtx.restore();
    _cCtx.drawImage(_cImg,0,0,_cCvs.width,_cCvs.height);
    _cCtx.save();_cCtx.beginPath();_cCtx.rect(0,0,_cCvs.width,_cCvs.height);_cCtx.rect(x,y+h,w,-h);_cCtx.clip('evenodd');
    _cCtx.fillStyle='rgba(0,0,0,0.6)';_cCtx.fillRect(0,0,_cCvs.width,_cCvs.height);_cCtx.restore();
    _cCtx.strokeStyle='#06D6A0';_cCtx.lineWidth=2;_cCtx.setLineDash([6,4]);_cCtx.strokeRect(x,y,w,h);_cCtx.setLineDash([]);
    document.getElementById('crop-dims-univ').textContent=Math.abs(Math.round(w*_USCALE))+'×'+Math.abs(Math.round(h*_USCALE))+'px';
  }
}
_cCvs.addEventListener('mousedown',e=>{_cDrag=true;_cStart={x:e.clientX,y:e.clientY};_cRect=null});
_cCvs.addEventListener('mousemove',e=>{if(!_cDrag)return;_cRect={x:Math.min(_cStart.x,e.clientX),y:Math.min(_cStart.y,e.clientY),w:Math.abs(e.clientX-_cStart.x),h:Math.abs(e.clientY-_cStart.y)};_drawC()});
_cCvs.addEventListener('mouseup',()=>_cDrag=false);

function univApplyCrop(mode){
  if(!_cRect||_cRect.w<5)return;
  const bg = mode==='pdf'?'white':mode;
  _captureViz(bg).then(url => {
    const hi = new Image(); hi.onload = () => {
      const {x,y,w,h} = _cRect;
      const sx=x/_cCvs.width*hi.width, sy=y/_cCvs.height*hi.height;
      const sw=w/_cCvs.width*hi.width, sh=h/_cCvs.height*hi.height;
      const tc=document.createElement('canvas');tc.width=sw;tc.height=sh;
      const tctx=tc.getContext('2d');
      if(bg==='white'){tctx.fillStyle='#fff';tctx.fillRect(0,0,sw,sh)}
      tctx.drawImage(hi,sx,sy,sw,sh,0,0,sw,sh);
      if(mode==='pdf'){
        const{jsPDF}=window.jspdf;
        const pdf=new jsPDF({orientation:sw>sh?'landscape':'portrait',unit:'px',format:[sw/_USCALE,sh/_USCALE]});
        pdf.addImage(tc.toDataURL('image/png'),'PNG',0,0,sw/_USCALE,sh/_USCALE);
        pdf.save('crop_export.pdf');
      } else _dlURL(tc.toDataURL('image/png'),'crop_'+mode+'.png');
      univCancelCrop();
    }; hi.src = url;
  });
}
function univCancelCrop(){_cOv.style.display='none';_cBar.style.display='none';_cRect=null}
</script>

<script>
// ═══ BIGGER FONTS ═══
(function() {
  function upgradeFonts() {
    const plotDiv = document.querySelector('.plotly-graph-div');
    if (!plotDiv || !plotDiv._fullLayout) { setTimeout(upgradeFonts, 200); return; }
    Plotly.relayout(plotDiv, {
      'title.font.size': 28,
      'title.font.family': 'JetBrains Mono, Courier New, monospace',
      'scene.xaxis.titlefont.size': 16,
      'scene.yaxis.titlefont.size': 16,
      'scene.zaxis.titlefont.size': 16,
      'scene.xaxis.tickfont.size': 13,
      'scene.yaxis.tickfont.size': 13,
      'scene.zaxis.tickfont.size': 13,
      'legend.font.size': 14,
      'margin.t': 90,
    });
  }
  setTimeout(upgradeFonts, 500);
})();
</script>

</body>
</html>
