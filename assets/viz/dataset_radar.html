      padding:14px 20px;font-size:14px;line-height:2}
.leg-row{display:flex;align-items:center;gap:8px;cursor:pointer}

const cv=document.getElementById('cv');
const ctx=cv.getContext('2d');
let W,H;
function resize(){W=cv.width=window.innerWidth;H=cv.height=window.innerHeight;}
resize();window.addEventListener('resize',resize);

const labelEl  = document.getElementById('robot-label');
const subEl    = document.getElementById('robot-sub');
const winEl    = document.getElementById('winner-badge');
const progFill = document.getElementById('prog-fill');
const dotNav   = document.getElementById('dot-nav');
const legEl    = document.getElementById('leg');
const pauseBtn = document.getElementById('btn-pause');

const DWELL=6500;
let cur=0, paused=false, startMs=Date.now(), elapsed=0;
let drawProg=0, phase=0, phaseTimer=0, curE=0;
// phase 0=draw-in cycling, 1=all together
const DRAW_SPEED=0.025, HOLD_F=50, ALL_F=120;
let hovE=-1;

// Build dots
SCREENS.forEach((_,i)=>{
  const d=document.createElement('div');
  d.className='dot';
  d.addEventListener('click',()=>goTo(i));
  dotNav.appendChild(d);
});

function buildLegend(s){
  legEl.innerHTML='<div style="color:#F72585;font-size:11px;letter-spacing:3px;'
    +'text-transform:uppercase;margin-bottom:8px">Encoders</div>';
  s.models.forEach((m,i)=>{
    const col=s.colors[m]||'#888';
    const row=document.createElement('div');
    row.className='leg-row';
    row.innerHTML=`<div class="leg-swatch" style="background:${col}"></div>`
      +`<span style="color:${col}">${m.replace('ptun-','')}</span>`;
    row.addEventListener('mouseenter',()=>hovE=i);
    row.addEventListener('mouseleave',()=>hovE=-1);
    legEl.appendChild(row);
  });
}

function goTo(idx){
  cur=((idx%SCREENS.length)+SCREENS.length)%SCREENS.length;
  const s=SCREENS[cur];
  labelEl.textContent=s.label;
  labelEl.style.color='#F72585';
  winEl.textContent=`★ ${s.winner} wins ${s.winner_wins}/${s.moving_total} moving joints`;
  buildLegend(s);
  // Update dots
  document.querySelectorAll('.dot').forEach((d,i)=>{
    d.className='dot'+(i===cur?' active':'');
    d.style.background=i===cur?'#F72585':'';
    d.style.borderColor=i===cur?'#F72585':'';
  });
  // Reset animation
  drawProg=0;phase=0;phaseTimer=0;curE=0;hovE=-1;
  startMs=Date.now();elapsed=0;
}

function radarPts(s,e,cx,cy,R){
  const n=s.joints.length;
  return s.joints.map((_,j)=>{
    const a=j/n*Math.PI*2-Math.PI/2;
    const inv=s.mse_inv[e][j];
    const r=inv!==null?Math.min(1,Math.max(0,inv)):0;
    return[cx+Math.cos(a)*R*r, cy+Math.sin(a)*R*r, a, r];
  });
}

function drawPoly(pts,col,alpha,lw,progress){
  const tot=pts.length;
  const drawn=progress*tot;
  ctx.beginPath();
  for(let i=0;i<tot;i++){
    const[px,py]=pts[i];
    if(i===0){ctx.moveTo(px,py);continue;}
    if(i<drawn){ctx.lineTo(px,py);continue;}
    const frac=drawn-i;
    if(frac>0){const[px0,py0]=pts[i-1];ctx.lineTo(px0+(px-px0)*frac,py0+(py-py0)*frac);}
    break;
  }
  if(progress>=1)ctx.closePath();
  ctx.strokeStyle=col;ctx.lineWidth=lw;ctx.globalAlpha=alpha;ctx.stroke();
  if(progress>=1){
    ctx.beginPath();pts.forEach(([px,py],i)=>i?ctx.lineTo(px,py):ctx.moveTo(px,py));
    ctx.closePath();ctx.fillStyle=col;ctx.globalAlpha=alpha*0.12;ctx.fill();
  }
  ctx.globalAlpha=1;
}

function frame(){
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle='#020810';ctx.fillRect(0,0,W,H);

  const s=SCREENS[cur];
  if(!s){requestAnimationFrame(frame);return;}

  const cx=W/2, cy=H/2+20;
  const R=Math.min(W,H)*0.34;
  const n=s.joints.length;
  const angles=s.joints.map((_,i)=>i/n*Math.PI*2-Math.PI/2);

  // Rings
  [0.25,0.5,0.75,1].forEach(fr=>{
    ctx.beginPath();
    angles.forEach((a,i)=>{
      const px=cx+Math.cos(a)*R*fr,py=cy+Math.sin(a)*R*fr;
      i?ctx.lineTo(px,py):ctx.moveTo(px,py);
    });
    ctx.closePath();
    ctx.strokeStyle=fr===1?'rgba(76,201,240,.22)':'rgba(76,201,240,.06)';
    ctx.lineWidth=fr===1?1.5:0.7;ctx.stroke();
    // Ring label
    const la=angles[0];
    ctx.fillStyle='rgba(76,201,240,.35)';ctx.font='13px JetBrains Mono';ctx.textAlign='left';
    ctx.fillText(`${Math.round(fr*100)}%`,cx+Math.cos(la)*R*fr+5,cy+Math.sin(la)*R*fr-5);
  });

  // Axes + joint labels
  angles.forEach((a,i)=>{
    ctx.beginPath();ctx.moveTo(cx,cy);
    ctx.lineTo(cx+Math.cos(a)*R,cy+Math.sin(a)*R);
    ctx.strokeStyle='rgba(76,201,240,.18)';ctx.lineWidth=1;ctx.stroke();
    const nm=s.non_mv.includes(i);
    const lx=cx+Math.cos(a)*(R+34),ly=cy+Math.sin(a)*(R+34);
    ctx.fillStyle=nm?'rgba(76,201,240,.25)':'#4CC9F0';
    ctx.font=(nm?'italic ':'')+'bold 16px JetBrains Mono';
    ctx.textAlign='center';
    const lbl=s.joints[i].replace('left_','').replace('panda_','')
                          .replace('_joint','').replace('joint','j');
    ctx.fillText(lbl,lx,ly);
  });
  ctx.textAlign='left';

  // Advance animation
  if(!paused && hovE<0){
    if(phase===0){
      drawProg=Math.min(1,drawProg+DRAW_SPEED);
      if(drawProg>=1){phaseTimer++;if(phaseTimer>=HOLD_F){curE=(curE+1)%s.models.length;drawProg=0;phaseTimer=0;if(curE===0){phase=1;phaseTimer=0;}}}
    } else {
      phaseTimer++;if(phaseTimer>=ALL_F){phase=0;curE=0;drawProg=0;phaseTimer=0;}
    }
  }

  // Draw polygons
  if(hovE>=0){
    s.models.forEach((_,e)=>{
      if(e===hovE)return;
      drawPoly(radarPts(s,e,cx,cy,R),s.colors[s.models[e]],0.07,1,1);
    });
    const col=s.colors[s.models[hovE]];
    ctx.shadowColor=col;ctx.shadowBlur=18;
    drawPoly(radarPts(s,hovE,cx,cy,R),col,0.92,3,1);
    ctx.shadowBlur=0;
    // RMSE values at vertices
    radarPts(s,hovE,cx,cy,R).forEach(([px,py,a],ji)=>{
      const v=s.mse_raw[hovE][ji];
      ctx.fillStyle=col;ctx.font='bold 13px JetBrains Mono';ctx.textAlign='center';
      ctx.fillText(v!==null?v.toFixed(3):'—',px+Math.cos(a)*22,py+Math.sin(a)*22);
    });
    ctx.textAlign='left';
  } else if(phase===1){
    s.models.forEach((_,e)=>drawPoly(radarPts(s,e,cx,cy,R),s.colors[s.models[e]],0.60,2,1));
  } else {
    for(let e=0;e<curE;e++) drawPoly(radarPts(s,e,cx,cy,R),s.colors[s.models[e]],0.22,1,1);
    const col=s.colors[s.models[curE]];
    ctx.shadowColor=col;ctx.shadowBlur=phase===0?10:18;
    drawPoly(radarPts(s,curE,cx,cy,R),col,0.88,2.5,drawProg);
    ctx.shadowBlur=0;
    // Model name stamp
    if(drawProg>0.3){
      ctx.fillStyle=col;ctx.globalAlpha=Math.min(1,(drawProg-0.3)*2.5);
      ctx.font='bold 20px JetBrains Mono';ctx.textAlign='center';
      ctx.fillText(s.models[curE].replace('ptun-',''),cx,cy+R+52);
      ctx.globalAlpha=1;ctx.textAlign='left';
    }
  }

  // Center dot
  ctx.beginPath();ctx.arc(cx,cy,5,0,Math.PI*2);
  ctx.fillStyle='#F72585';ctx.shadowColor='#F72585';ctx.shadowBlur=12;ctx.fill();ctx.shadowBlur=0;

  // Progress timer
  if(!paused){
    elapsed=Date.now()-startMs;
    const frac=Math.min(1,elapsed/DWELL);
    progFill.style.width=(frac*100)+'%';
    if(frac>=1) goTo(cur+1);
  }

  requestAnimationFrame(frame);
}

document.getElementById('btn-prev').addEventListener('click',()=>goTo(cur-1));
document.getElementById('btn-next').addEventListener('click',()=>goTo(cur+1));
pauseBtn.addEventListener('click',()=>{
  paused=!paused;pauseBtn.textContent=paused?'▶ play':'⏸ pause';
  if(!paused)startMs=Date.now()-elapsed;
});

goTo(0);
frame();
</script>
</body>
