    mv.push(g.map((v,d)=>v+(Math.random()-.5)*[.06,.08,.06,.06,.14,.10][d]));
  }
  return{gt,sv,mv};
}

const MV_ERRORS=DATA.mv.map((f,i)=>{let s=0;for(let d=0;d<6;d++)s+=(f[d]-DATA.gt[i][d])**2;return Math.sqrt(s/6)});
const MAX_ERR=Math.max(...SV_ERRORS,...MV_ERRORS);

function errToRGB(err){
  const t=Math.min(err/(MAX_ERR*.8),1);
  if(t<.33)return[.02+t*2.5,.84-t*.6,.63-t*1.5];
  if(t<.66)return[.97,.72-t*.9,.1];
  return[1,.15-(t-.66)*.3,0];
}

// Three.js setup
const canvas=document.getElementById('c');
const renderer=new THREE.WebGLRenderer({canvas,antialias:true,alpha:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
const scene=new THREE.Scene();
scene.background=new THREE.Color(0x020810);
scene.fog=new THREE.FogExp2(0x020810,.012);
const camera=new THREE.PerspectiveCamera(50,1,.1,500);
camera.position.set(8,6,12);camera.lookAt(0,0,0);
function resize(){renderer.setSize(innerWidth,innerHeight);camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix()}
resize();window.addEventListener('resize',resize);

scene.add(new THREE.AmbientLight(0x0a1830,2));
[[0xF72585,3,40,5,10,5],[0x4CC9F0,2,35,-8,5,8],[0x06D6A0,1.5,30,0,-3,-10],[0xFFB703,1,25,10,0,-5]].forEach(([c,i,d,x,y,z])=>{const p=new THREE.PointLight(c,i,d);p.position.set(x,y,z);scene.add(p)});

// Stars
const sN=1200,sP=new Float32Array(sN*3),sS=new Float32Array(sN);
for(let i=0;i<sN;i++){const th=Math.random()*Math.PI*2,ph=Math.acos(2*Math.random()-1),r=40+Math.random()*60;sP[i*3]=r*Math.sin(ph)*Math.cos(th);sP[i*3+1]=r*Math.sin(ph)*Math.sin(th);sP[i*3+2]=r*Math.cos(ph);sS[i]=.3+Math.random()*1.2}
const sGeo=new THREE.BufferGeometry();sGeo.setAttribute('position',new THREE.BufferAttribute(sP,3));sGeo.setAttribute('size',new THREE.BufferAttribute(sS,1));
scene.add(new THREE.Points(sGeo,new THREE.ShaderMaterial({vertexShader:`attribute float size;varying float vB;void main(){vB=.3+.7*fract(sin(dot(position.xy,vec2(12.9898,78.233)))*43758.5453);vec4 mv=modelViewMatrix*vec4(position,1.);gl_PointSize=size*(80./-mv.z);gl_Position=projectionMatrix*mv;}`,fragmentShader:`varying float vB;void main(){float d=length(gl_PointCoord-.5)*2.;float a=1.-smoothstep(0.,1.,d);gl_FragColor=vec4(vec3(.6,.75,.9)*vB,a*.4);}`,transparent:true,depthWrite:false,blending:THREE.AdditiveBlending})));

// Grid
const gPts=[];for(let i=-6;i<=6;i++){gPts.push(-6,-SCALE/2,i*SCALE/6,6,-SCALE/2,i*SCALE/6,i*SCALE/6,-SCALE/2,-6,i*SCALE/6,-SCALE/2,6)}
const gGeo=new THREE.BufferGeometry();gGeo.setAttribute('position',new THREE.Float32BufferAttribute(gPts,3));
scene.add(new THREE.LineSegments(gGeo,new THREE.LineBasicMaterial({color:0x0a1a2a,transparent:true,opacity:.25})));
const axLen=SCALE*.6;
[[1,0,0,0x4CC9F0],[0,1,0,0x06D6A0],[0,0,1,0xFFB703]].forEach(([dx,dy,dz,c])=>{scene.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(0,0,0),new THREE.Vector3(dx*axLen,dy*axLen,dz*axLen)]),new THREE.LineBasicMaterial({color:c,transparent:true,opacity:.35})))});

// ═══════════════════════════════════════════════════════════════
// PERSISTENT TRAJECTORIES
// ═══════════════════════════════════════════════════════════════
let currentDOFs=[0,1,2];
let showLayers={gt:true,sv:true,mv:true,err:true};

function dofToPos(frame,dofs){
  return new THREE.Vector3((frame[dofs[0]]-.5)*SCALE,(frame[dofs[1]]-.5)*SCALE,(frame[dofs[2]]-.5)*SCALE);
}

const tGroup=new THREE.Group();scene.add(tGroup);

function makeLine(color,opacity,width){
  const pos=new Float32Array(N_FRAMES*3);
  const geo=new THREE.BufferGeometry();
  geo.setAttribute('position',new THREE.BufferAttribute(pos,3));
  geo.setDrawRange(0,0);
  return new THREE.Line(geo,new THREE.LineBasicMaterial({color,transparent:true,opacity}));
}

// GT: bright white solid + soft glow copy
const gtLine=makeLine(0xffffff,.9);
const gtGlow=makeLine(0xaaccff,.2);
// SV: blue line + glow
const svLine=makeLine(0x4361EE,.8);
const svGlow=makeLine(0x4361EE,.15);
// MV: pink line + glow
const mvLine=makeLine(0xF72585,.85);
const mvGlow=makeLine(0xF72585,.18);

tGroup.add(gtGlow,gtLine,svGlow,svLine,mvGlow,mvLine);

const errGroup=new THREE.Group();tGroup.add(errGroup);
let lastErrFrame=-1;
const ERR_INTERVAL=6;

// Current heads
const hGeo=new THREE.SphereGeometry(.15,16,16);
const gtHead=new THREE.Mesh(hGeo,new THREE.MeshBasicMaterial({color:0xffffff,transparent:true,opacity:.95}));
const svHead=new THREE.Mesh(hGeo,new THREE.MeshBasicMaterial({color:0x4361EE,transparent:true,opacity:.85}));
const mvHead=new THREE.Mesh(hGeo,new THREE.MeshBasicMaterial({color:0xF72585,transparent:true,opacity:.9}));
tGroup.add(gtHead,svHead,mvHead);

// Glow shells
function addGlow(parent,color){
  parent.add(new THREE.Mesh(new THREE.SphereGeometry(.35,16,16),new THREE.ShaderMaterial({
    uniforms:{uColor:{value:new THREE.Color(color)},uTime:{value:0}},
    vertexShader:`varying vec3 vN;void main(){vN=normalize(normalMatrix*normal);gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.);}`,
    fragmentShader:`uniform vec3 uColor;uniform float uTime;varying vec3 vN;void main(){float i=pow(.65-dot(vN,vec3(0,0,1)),2.5);float p=.7+.3*sin(uTime*2.);gl_FragColor=vec4(uColor*i*p,i*.45);}`,
    transparent:true,side:THREE.BackSide,blending:THREE.AdditiveBlending,depthWrite:false
  })));
}
addGlow(gtHead,0xffffff);addGlow(svHead,0x4361EE);addGlow(mvHead,0xF72585);

// DOF panel
const dofPanel=document.getElementById('dof-panel');
const dofBars=[];
DOF_NAMES.forEach((name,i)=>{
  const row=document.createElement('div');row.className='dof-row';
  row.innerHTML=`<span class="dof-name" style="color:#${DOF_COLORS[i].toString(16).padStart(6,'0')}">${name}</span><div class="dof-bar-bg"><div class="dof-bar-sv" style="background:#4361EE;width:0%"></div><div class="dof-bar-mv" style="background:#F72585;width:0%"></div></div><span class="dof-val"></span>`;
  dofPanel.appendChild(row);
  dofBars.push({sv:row.querySelector('.dof-bar-sv'),mv:row.querySelector('.dof-bar-mv'),val:row.querySelector('.dof-val')});
});

// ═══════════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════════
let currentFrame=0,isPlaying=true,animSpeed=.5,frameAccum=0;
let highWaterMark=0;

let isDragging=false,prevMouse={x:0,y:0},orbitY=.3,orbitX=.4,camDist=16;
canvas.addEventListener('mousedown',e=>{isDragging=true;prevMouse={x:e.clientX,y:e.clientY}});
canvas.addEventListener('mousemove',e=>{if(!isDragging)return;orbitY+=(e.clientX-prevMouse.x)*.005;orbitX+=(e.clientY-prevMouse.y)*.003;orbitX=Math.max(-1.2,Math.min(1.2,orbitX));prevMouse={x:e.clientX,y:e.clientY}});
canvas.addEventListener('mouseup',()=>isDragging=false);
canvas.addEventListener('mouseleave',()=>isDragging=false);
canvas.addEventListener('wheel',e=>{camDist+=e.deltaY*.02;camDist=Math.max(5,Math.min(40,camDist));e.preventDefault()},{passive:false});

function togglePlay(){isPlaying=!isPlaying;document.querySelector('#controls .cbtn').textContent=isPlaying?'⏸ PAUSE':'▶ ANIMATE'}
function toggleView(mode){currentDOFs=mode==='height'?[0,1,2]:[3,4,5];clearTrails()}
function toggleLayer(key){
  showLayers[key]=!showLayers[key];
  document.querySelectorAll('#controls .cbtn').forEach(b=>{
    if(b.textContent.includes('GT')&&key==='gt')b.classList.toggle('active',showLayers.gt);
    if(b.textContent.includes('SINGLE')&&key==='sv')b.classList.toggle('active',showLayers.sv);
    if(b.textContent.includes('MULTI')&&key==='mv')b.classList.toggle('active',showLayers.mv);
    if(b.textContent.includes('ERROR')&&key==='err')b.classList.toggle('active',showLayers.err);
  });
}
function clearTrails(){
  highWaterMark=0;currentFrame=0;lastErrFrame=-1;frameAccum=0;
  [gtLine,gtGlow,svLine,svGlow,mvLine,mvGlow].forEach(l=>l.geometry.setDrawRange(0,0));
  while(errGroup.children.length)errGroup.remove(errGroup.children[0]);
  isPlaying=true;
}
function resetCamera(){orbitY=.3;orbitX=.4;camDist=16}
function scrub(val){currentFrame=parseInt(val);isPlaying=false}

// ═══════════════════════════════════════════════════════════════
// UPDATE — paints permanent points
// ═══════════════════════════════════════════════════════════════
function updateFrame(frame){
  const f=Math.floor(frame);if(f>=N_FRAMES)return;

  for(let i=highWaterMark;i<=f;i++){
    const gtP=dofToPos(DATA.gt[i],currentDOFs);
    const svP=dofToPos(DATA.sv[i],currentDOFs);
    const mvP=dofToPos(DATA.mv[i],currentDOFs);

    // Write positions into all 6 line buffers
    [[gtLine,gtGlow],[svLine,svGlow],[mvLine,mvGlow]].forEach(([main,glow],li)=>{
      const p=[gtP,svP,mvP][li];
      const a=main.geometry.attributes.position.array;
      a[i*3]=p.x;a[i*3+1]=p.y;a[i*3+2]=p.z;
      const g=glow.geometry.attributes.position.array;
      g[i*3]=p.x;g[i*3+1]=p.y;g[i*3+2]=p.z;
    });

    // Error connector lines every ERR_INTERVAL frames
    if(i%ERR_INTERVAL===0&&i>lastErrFrame){
      lastErrFrame=i;
      const svErr=SV_ERRORS[i],mvErr=MV_ERRORS[i];
      const svIG=new THREE.BufferGeometry().setFromPoints([svP,gtP]);
      const svIn=Math.min(svErr/MAX_ERR,1);
      errGroup.add(new THREE.Line(svIG,new THREE.LineBasicMaterial({color:new THREE.Color().setRGB(...errToRGB(svErr)),transparent:true,opacity:.12+svIn*.2})));
      const mvIG=new THREE.BufferGeometry().setFromPoints([mvP,gtP]);
      const mvIn=Math.min(mvErr/MAX_ERR,1);
      errGroup.add(new THREE.Line(mvIG,new THREE.LineBasicMaterial({color:new THREE.Color().setRGB(...errToRGB(mvErr)),transparent:true,opacity:.12+mvIn*.2})));
    }
  }

  if(f>=highWaterMark)highWaterMark=f+1;

  // Mark dirty + set draw range
  [gtLine,gtGlow,svLine,svGlow,mvLine,mvGlow].forEach(l=>{
    l.geometry.attributes.position.needsUpdate=true;
    l.geometry.setDrawRange(0,Math.min(highWaterMark,N_FRAMES));
  });

  // Move heads
  gtHead.position.copy(dofToPos(DATA.gt[f],currentDOFs));
  svHead.position.copy(dofToPos(DATA.sv[f],currentDOFs));
  mvHead.position.copy(dofToPos(DATA.mv[f],currentDOFs));

  // Visibility
  gtLine.visible=gtGlow.visible=gtHead.visible=showLayers.gt;
  svLine.visible=svGlow.visible=svHead.visible=showLayers.sv;
  mvLine.visible=mvGlow.visible=mvHead.visible=showLayers.mv;
  errGroup.visible=showLayers.err;

  // DOF bars
  for(let d=0;d<6;d++){
    const se=Math.abs(DATA.sv[f][d]-DATA.gt[f][d]);
    const me=Math.abs(DATA.mv[f][d]-DATA.gt[f][d]);
    dofBars[d].sv.style.width=Math.min(se/.15*100,100)+'%';
    dofBars[d].mv.style.width=Math.min(me/.15*100,100)+'%';
    const imp=se>0?((se-me)/se*100):0;
    dofBars[d].val.textContent=imp>0?`+${imp.toFixed(0)}%`:`${imp.toFixed(0)}%`;
    dofBars[d].val.style.color=imp>0?'#06D6A0':'#ff4444';
  }

  // Running RMSE
  if(f>0){
    let svS=0,mvS=0;for(let i=0;i<=f;i++){svS+=SV_ERRORS[i]**2;mvS+=MV_ERRORS[i]**2}
    const svR=Math.sqrt(svS/(f+1)),mvR=Math.sqrt(mvS/(f+1));
    document.getElementById('sv-nrmse').textContent=svR.toFixed(4);
    document.getElementById('mv-nrmse').textContent=mvR.toFixed(4);
    const imp=(svR-mvR)/svR*100;
    document.getElementById('improvement').textContent=(imp>0?'+':'')+imp.toFixed(1)+'%';
  }

  document.getElementById('scrubber').value=f;
  document.getElementById('scrubber').max=N_FRAMES-1;
  document.getElementById('frame-num').textContent=f;
}

// ═══════════════════════════════════════════════════════════════
// RENDER LOOP
// ═══════════════════════════════════════════════════════════════
const clock=new THREE.Clock();
function animate(){
  requestAnimationFrame(animate);
  const dt=clock.getDelta(),time=clock.getElapsedTime();

  if(isPlaying){
    frameAccum+=dt*15*animSpeed;
    if(frameAccum>=1){
      currentFrame+=Math.floor(frameAccum);
      if(currentFrame>=N_FRAMES){currentFrame=N_FRAMES-1;isPlaying=false}
      frameAccum%=1;
    }
  }

  if(!isDragging)orbitY+=dt*.08;
  camera.position.x=Math.sin(orbitY)*Math.cos(orbitX)*camDist;
  camera.position.y=Math.sin(orbitX)*camDist;
  camera.position.z=Math.cos(orbitY)*Math.cos(orbitX)*camDist;
  camera.lookAt(0,0,0);

  tGroup.traverse(o=>{if(o.material&&o.material.uniforms&&o.material.uniforms.uTime)o.material.uniforms.uTime.value=time});

  updateFrame(currentFrame);
  renderer.render(scene,camera);
}
animate();
</script>
